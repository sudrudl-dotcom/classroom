  const[adding,setAdding]=React.useState(false);
  const[editClassName,setEditClassName]=React.useState("");
  const[editEmoji,setEditEmoji]=React.useState("📚");
  const[classSaving,setClassSaving]=React.useState(false);
  const[mathDetail,setMathDetail]=React.useState({});
  const[missionDetail,setMissionDetail]=React.useState({});
  const[mathComments,setMathComments]=React.useState({});
  const[missionComments,setMissionComments]=React.useState({});
  const[mathCommentDraft,setMathCommentDraft]=React.useState({});
  const[missionCommentDraft,setMissionCommentDraft]=React.useState({});
  const[detailTab,setDetailTab]=React.useState("math");
  // 삭제 확인 (2단계)
  const[deleteConfirm,setDeleteConfirm]=React.useState(null);
  // 교사 지난 기록
  const[missionsByDate,setMissionsByDate]=React.useState({});
  const[mobileShowDetail,setMobileShowDetail]=React.useState(false);
  const[expandedMathHist,setExpandedMathHist]=React.useState({});
  const[mathHist,setMathHist]=React.useState({});
  const[expandedMissionHist,setExpandedMissionHist]=React.useState({});
  const[missionHist,setMissionHist]=React.useState({});
  const[refreshing,setRefreshing]=React.useState(false);
  // 미제출 누적 기록
  const[attendanceData,setAttendanceData]=React.useState(null);
  const[attendanceLoading,setAttendanceLoading]=React.useState(false);
  const[expandedAttendance,setExpandedAttendance]=React.useState({});

  // ref로 항상 최신값 유지 → RT 콜백에서 stale closure 없이 사용
  const studentsRef=React.useRef([]);
  const selectedIdRef=React.useRef(null);
  React.useEffect(()=>{studentsRef.current=students;},[students]);
  React.useEffect(()=>{selectedIdRef.current=selectedId;},[selectedId]);

  const dateKey=today();
  const selected=students.find(s=>s.id===selectedId);

  React.useEffect(()=>{loadStudents();loadClassSettings();loadMission();},[]);
  React.useEffect(()=>{if(selectedId)loadWritings(selectedId);},[selectedId]);
  React.useEffect(()=>{if(students.length>0)loadTodaySubs();},[students]);
  React.useEffect(()=>{
    const ch=sb.channel('t-rt-'+CLASS_ID)
      .on('postgres_changes',{event:'*',schema:'public',table:'writings'},()=>{loadTodaySubs();const sid=selectedIdRef.current;if(sid)loadWritings(sid);})
      .on('postgres_changes',{event:'*',schema:'public',table:'maths'},()=>loadTodaySubs())
      .on('postgres_changes',{event:'*',schema:'public',table:'mission_submissions'},()=>loadTodaySubs())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments'},()=>{const sid=selectedIdRef.current;if(sid)loadWritings(sid);})
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[]);
  // 실시간 구독이 안 될 경우를 대비해 10초마다 자동 폴링
  React.useEffect(()=>{
    const timer=setInterval(()=>{if(studentsRef.current.length>0)loadTodaySubs();},10000);
    return()=>clearInterval(timer);
  },[]);

  async function refreshAll(){
    setRefreshing(true);
    // 화면 상태(탭, 선택 학생) 유지하면서 데이터만 새로 불러오기
    const{data:sData}=await sb.from("students").select("*").eq("class_id",CLASS_ID).order("sort_order",{nullsFirst:false}).order("created_at");
    if(sData)setStudents(sData);
    await loadMission();
    if(sData&&sData.length>0){
      const ids=sData.map(s=>s.id);
      const{data:wData}=await sb.from("writings").select("student_id").in("student_id",ids).eq("date",dateKey);
      const{data:mData}=await sb.from("maths").select("*").in("student_id",ids).eq("date",dateKey);
      const{data:msData}=await sb.from("mission_submissions").select("*").in("student_id",ids).eq("date",dateKey);
      const subs={};const mDet={};const msDet={};
      ids.forEach(id=>{
        const m=(mData||[]).find(m=>m.student_id===id);
        const ms=(msData||[]).find(m=>m.student_id===id);
        subs[id]={writing:!!(wData||[]).find(w=>w.student_id===id),math:!!(m&&m.done),mission:!!(ms&&ms.done)};
        if(m)mDet[id]=m;if(ms)msDet[id]=ms;
      });
      setTodaySubs(subs);setMathDetail(mDet);setMissionDetail(msDet);
      const{data:mcData}=await sb.from("comments").select("*").in("student_id",ids).eq("date","math_"+dateKey).order("created_at");
      const{data:mscData}=await sb.from("comments").select("*").in("student_id",ids).eq("date","mission_"+dateKey).order("created_at");
      const mc={};const msc={};
      (mcData||[]).forEach(c=>{if(!mc[c.student_id])mc[c.student_id]=[];mc[c.student_id].push(c);});
      (mscData||[]).forEach(c=>{if(!msc[c.student_id])msc[c.student_id]=[];msc[c.student_id].push(c);});
      setMathComments(mc);setMissionComments(msc);
    }
    if(selectedId)await loadWritings(selectedId);
    setRefreshing(false);
  }
  async function loadClassSettings(){const{data}=await sb.from("classrooms").select("*").eq("class_id",CLASS_ID).maybeSingle();if(data){setEditClassName(data.class_name||"");setEditEmoji(data.emoji||"📚");}}
  async function loadStudents(){setLoading(true);const{data}=await sb.from("students").select("*").eq("class_id",CLASS_ID).order("sort_order",{nullsFirst:false}).order("created_at");setStudents(data||[]);setLoading(false);}
  async function loadMission(date){const d=date||missionDate||today();const{data}=await sb.from("missions").select("*").eq("date",d).eq("class_id",CLASS_ID).maybeSingle();setMission(data?data.content:"");}
  async function loadWritings(sid){
    const{data}=await sb.from("writings").select("*").eq("student_id",sid).order("date",{ascending:false});
    setWritings(data||[]);
    const dates=(data||[]).map(w=>w.date);
    if(dates.length>0){
      const{data:cData}=await sb.from("comments").select("*").eq("student_id",sid).in("date",dates).order("created_at");
      const g={};(cData||[]).forEach(c=>{if(!g[c.date])g[c.date]=[];g[c.date].push(c);});setComments(g);
      const{data:mData}=await sb.from("missions").select("date,content").eq("class_id",CLASS_ID).in("date",dates);
      const mg={};(mData||[]).forEach(m=>{mg[m.date]=m.content;});setMissionsByDate(mg);
    }
    else{setComments({});setMissionsByDate({});}
  }
  async function loadTodaySubs(){
    const ids=(studentsRef.current.length>0?studentsRef.current:students).map(s=>s.id);
    const{data:wData}=await sb.from("writings").select("student_id").in("student_id",ids).eq("date",dateKey);
    const{data:mData}=await sb.from("maths").select("*").in("student_id",ids).eq("date",dateKey);
    const{data:msData}=await sb.from("mission_submissions").select("*").in("student_id",ids).eq("date",dateKey);
    const subs={};const mDet={};const msDet={};
    ids.forEach(id=>{
      const m=(mData||[]).find(m=>m.student_id===id);
      const ms=(msData||[]).find(m=>m.student_id===id);
      subs[id]={writing:!!(wData||[]).find(w=>w.student_id===id),math:!!(m&&m.done),mission:!!(ms&&ms.done)};
      if(m)mDet[id]=m;if(ms)msDet[id]=ms;
    });
    setTodaySubs(subs);setMathDetail(mDet);setMissionDetail(msDet);
    const{data:mcData}=await sb.from("comments").select("*").in("student_id",ids).eq("date","math_"+dateKey).order("created_at");
    const{data:mscData}=await sb.from("comments").select("*").in("student_id",ids).eq("date","mission_"+dateKey).order("created_at");
    const mc={};const msc={};
    (mcData||[]).forEach(c=>{if(!mc[c.student_id])mc[c.student_id]=[];mc[c.student_id].push(c);});
    (mscData||[]).forEach(c=>{if(!msc[c.student_id])msc[c.student_id]=[];msc[c.student_id].push(c);});
    setMathComments(mc);setMissionComments(msc);
  }

  async function loadAttendance(){
    setAttendanceLoading(true);
    const ids=studentsRef.current.map(s=>s.id);
    const{data:missionRows}=await sb.from("missions").select("date").eq("class_id",CLASS_ID).order("date");
    const classDates=[...new Set((missionRows||[]).map(m=>m.date))].filter(d=>d<=dateKey).sort();
    const{data:wRows}=await sb.from("writings").select("student_id,date").in("student_id",ids);
    const{data:mRows}=await sb.from("maths").select("student_id,date,done").in("student_id",ids);
    const{data:msRows}=await sb.from("mission_submissions").select("student_id,date,done").in("student_id",ids);
    const byStudent={};
    ids.forEach(id=>{
      const wDates=new Set((wRows||[]).filter(r=>r.student_id===id).map(r=>r.date));
      const mDates=new Set((mRows||[]).filter(r=>r.student_id===id&&r.done).map(r=>r.date));
      const msDates=new Set((msRows||[]).filter(r=>r.student_id===id&&r.done).map(r=>r.date));
      byStudent[id]={
        missedWriting:classDates.filter(d=>!wDates.has(d)),
        missedMath:classDates.filter(d=>!mDates.has(d)),
        missedMission:classDates.filter(d=>!msDates.has(d)),
      };
    });
    setAttendanceData({classDates,byStudent});
    setAttendanceLoading(false);
  }
  async function toggleMathHist(sid){
    if(expandedMathHist[sid]){setExpandedMathHist(p=>({...p,[sid]:false}));return;}
    const{data}=await sb.from("maths").select("*").eq("student_id",sid).order("date",{ascending:false});
    setMathHist(p=>({...p,[sid]:data||[]}));setExpandedMathHist(p=>({...p,[sid]:true}));
  }
  async function toggleMissionHist(sid){
    if(expandedMissionHist[sid]){setExpandedMissionHist(p=>({...p,[sid]:false}));return;}
    const{data}=await sb.from("mission_submissions").select("*").eq("student_id",sid).order("date",{ascending:false});
    setMissionHist(p=>({...p,[sid]:data||[]}));setExpandedMissionHist(p=>({...p,[sid]:true}));
    const dates=(data||[]).map(m=>m.date);
    if(dates.length>0){
      const{data:mData}=await sb.from("missions").select("date,content").eq("class_id",CLASS_ID).in("date",dates);
      const mg={};(mData||[]).forEach(m=>{mg[m.date]=m.content;});
      setMissionsByDate(p=>({...p,...mg}));
    }
  }

  async function addStudent(){
    const n=newName.trim();if(!n)return;
    setAdding(true);setAddError("");
    const color=COLORS[students.length%COLORS.length];
    const maxOrder=students.length>0?Math.max(...students.map(s=>s.sort_order??0)):0;
    const{data,error}=await sb.from("students").insert({name:n,color,class_id:CLASS_ID,sort_order:maxOrder+1}).select().single();
    setAdding(false);
    if(error){setAddError("등록 실패: "+(error.message||error.code||JSON.stringify(error)));return;}
    if(data){setStudents(p=>[...p,data]);setNewName("");}
  }
  async function saveClassConfig(){
    setClassSaving(true);
    await sb.from("classrooms").update({class_name:editClassName.trim()||"우리 교실",emoji:editEmoji.trim()||"📚"}).eq("class_id",CLASS_ID);
    setClassSaving(false);window.location.reload();
  }
  async function removeStudent(id){
    await sb.from("students").delete().eq("id",id);
    setStudents(p=>p.filter(s=>s.id!==id));
    setDeleteConfirm(null);
    if(selectedId===id){setSelectedId(null);setWritings([]);}
  }

  const dragSrcId=React.useRef(null);
  const[dragOverId,setDragOverId]=React.useState(null);
  async function doReorder(fromId,toId){
    if(!fromId||!toId||fromId===toId)return;
    const fi=students.findIndex(s=>s.id===fromId);const ti=students.findIndex(s=>s.id===toId);
    if(fi<0||ti<0)return;
    const r=[...students];const[m]=r.splice(fi,1);r.splice(ti,0,m);
    const wo=r.map((s,i)=>({...s,sort_order:i+1}));
    setStudents(wo);setDragOverId(null);dragSrcId.current=null;
    await Promise.all(wo.map(s=>sb.from("students").update({sort_order:s.sort_order}).eq("id",s.id)));
  }
  function onTouchMove(e){e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const card=el&&el.closest('[data-sid]');if(card)setDragOverId(card.getAttribute('data-sid'));}

  async function saveMission(){
    const d=missionDate||today();
    const{data:existing}=await sb.from("missions").select("id").eq("date",d).eq("class_id",CLASS_ID).maybeSingle();
    let error;
    if(existing){({error}=await sb.from("missions").update({content:mission}).eq("id",existing.id));}
    else{({error}=await sb.from("missions").insert({content:mission,date:d,class_id:CLASS_ID}));}
    if(error){alert("미션 저장 실패: "+error.message);return;}
    setMissionSaved(true);setTimeout(()=>setMissionSaved(false),1500);
  }
  async function sendComment(sid,date,text){
    if(!text?.trim())return;const key=`${sid}_${date}`;
    setSending(p=>({...p,[key]:true}));
    const{data}=await sb.from("comments").insert({student_id:sid,date,text:text.trim()}).select().single();
    await sb.from("notifications").insert({student_id:sid,message:"선생님이 댓글을 달았어요! 💬"});
    setComments(p=>({...p,[date]:[...(p[date]||[]),data]}));
    setCommentDraft(p=>({...p,[key]:""}));setSending(p=>({...p,[key]:false}));
  }
  async function deleteComment(sid,date,cid){await sb.from("comments").delete().eq("id",cid);setComments(p=>({...p,[date]:(p[date]||[]).filter(c=>c.id!==cid)}));}
  async function sendMathComment(sid,text){
    if(!text?.trim())return;
    const dt="math_"+dateKey;
    const{data}=await sb.from("comments").insert({student_id:sid,date:dt,text:text.trim()}).select().single();
    await sb.from("notifications").insert({student_id:sid,message:"선생님이 수학 댓글을 달았어요! 💬"});
    setMathComments(p=>({...p,[sid]:[...(p[sid]||[]),data]}));setMathCommentDraft(p=>({...p,[sid]:""}));
  }
  async function deleteMathComment(sid,cid){await sb.from("comments").delete().eq("id",cid);setMathComments(p=>({...p,[sid]:(p[sid]||[]).filter(c=>c.id!==cid)}));}
  async function sendMissionComment(sid,text){
    if(!text?.trim())return;
    const dt="mission_"+dateKey;
    const{data}=await sb.from("comments").insert({student_id:sid,date:dt,text:text.trim()}).select().single();
    await sb.from("notifications").insert({student_id:sid,message:"선생님이 미션 댓글을 달았어요! 💬"});
    setMissionComments(p=>({...p,[sid]:[...(p[sid]||[]),data]}));setMissionCommentDraft(p=>({...p,[sid]:""}));
  }
  async function deleteMissionComment(sid,cid){await sb.from("comments").delete().eq("id",cid);setMissionComments(p=>({...p,[sid]:(p[sid]||[]).filter(c=>c.id!==cid)}));}
  function buildCopyText(w){const coms=comments[w.date]||[];return[w.date,w.title||"제목 없음","",w.content||"",...(coms.length>0?["","── 선생님 댓글 ──",...coms.map(c=>c.text)]:[])].join("\n");}
  function buildAllText(){return writings.map(w=>buildCopyText(w)+"\n\n"+"─".repeat(30)).join("\n\n");}

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><Spinner/></div>;

  return (
    <div className="teacher-wrap">
      <header className="t-header">
        <div className="t-logo">🍀 선생님 교실</div>
        <nav className="t-nav">
          {[{key:"writings",label:"📖 글 & 댓글"},{key:"students",label:"👥 학생·미션"}].map(t=>(
            <button key={t.key} className={`t-nav-btn ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}>{t.label}</button>
          ))}
        </nav>
        <button onClick={refreshAll} disabled={refreshing} style={{marginLeft:"auto",background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:13,cursor:refreshing?"not-allowed":"pointer",fontFamily:"'Noto Sans KR',sans-serif",display:"flex",alignItems:"center",gap:6,opacity:refreshing?.6:1,flexShrink:0}}>
          <span style={{display:"inline-block",animation:refreshing?"spin .8s linear infinite":"none"}}>🔄</span>
          <span style={{fontSize:12}}>{refreshing?"새로고침 중...":"새로고침"}</span>
        </button>
      </header>

      {tab==="writings"&&(
        <div>
          {!(mobileShowDetail&&window.innerWidth<=600)&&(()=>{
            const notWriting=students.filter(s=>!(todaySubs[s.id]?.writing));
            const notMath=students.filter(s=>!(todaySubs[s.id]?.math));
            const notMission=students.filter(s=>!(todaySubs[s.id]?.mission));
            return students.length>0&&(
              <div className="missing-panel">
                <div className="mp-title">📋 오늘({dateKey}) 미제출 현황 — 실시간</div>
                <div className="mp-cols">
                  <div>
                    <div className="mp-col-title">📝 글똥 미제출 ({notWriting.length})</div>
                    {notWriting.length===0?<div className="mp-done">모두 완료! 🎉</div>:(
                      <div className="mp-chips">{notWriting.map(s=><span key={s.id} className="mp-chip" style={{borderColor:s.color,color:s.color}}>{s.name}</span>)}</div>
                    )}
                  </div>
                  <div>
                    <div className="mp-col-title">🔢 수학 미완료 ({notMath.length})</div>
                    {notMath.length===0?<div className="mp-done">모두 완료! 🎉</div>:(
                      <div className="mp-chips">{notMath.map(s=><span key={s.id} className="mp-chip" style={{borderColor:s.color,color:s.color}}>{s.name}</span>)}</div>
                    )}
                  </div>
                  <div>
                    <div className="mp-col-title">🎯 미션 미완료 ({notMission.length})</div>
                    {notMission.length===0?<div className="mp-done">모두 완료! 🎉</div>:(
                      <div className="mp-chips">{notMission.map(s=><span key={s.id} className="mp-chip" style={{borderColor:s.color,color:s.color}}>{s.name}</span>)}</div>

                  </div>
                </div>

          })()}
        <div className="writings-layout">

              <div key={s.id} className={`ws-item ${selectedId===s.id?"active":""}`} style={{borderLeft:`4px solid ${s.color}`}} onClick={()=>{setSelectedId(s.id);setMobileShowDetail(true);}}>
                <span className="ws-name">{s.name}</span>
                <div className="ws-badges-mini"><span className={`dot ${sub.writing?"on":""}`}/><span className={`dot ${sub.math?"on":""}`}/><span className={`dot ${sub.mission?"on":""}`}/></div>
              </div>
            );})}
            {students.length===0&&<div className="ws-empty">학생을 먼저 등록하세요</div>}
          </aside>
          <main className="writings-main" style={!mobileShowDetail&&window.innerWidth<=600?{display:"none"}:{}}>

                <div className="wm-header">
                  <div className="wm-name" style={{color:selected.color}}>{selected.name}</div>
                  <div className="wm-actions"><span className="wm-count">{writings.length}편</span>{writings.length>0&&<CopyBtn label="📋 전체 복사" text={buildAllText()}/>}</div>

        </div>
        </div>
      )}

      {tab==="students"&&(
        <div className="t-content">
          <div className="t-section">

function StudentView(){
  const[students,setStudents]=React.useState([]);
  const[selectedId,setSelectedId]=React.useState(null);
  const[tab,setTab]=React.useState("writing");
  const[writing,setWriting]=React.useState({title:"",content:""});
  const[math,setMath]=React.useState({wrong_count:0,wrong_reason:"",memo:"",done:false});
  const[missionData,setMissionData]=React.useState({done:false,comment:""});
  const[missionText,setMissionText]=React.useState("오늘의 미션을 입력하세요");
  const[myComments,setMyComments]=React.useState([]);
  const[myMathComments,setMyMathComments]=React.useState([]);
  const[myMissionComments,setMyMissionComments]=React.useState([]);
  const[notifications,setNotifications]=React.useState([]);
  const[showNotif,setShowNotif]=React.useState(false);
  const[saved,setSaved]=React.useState({});
  const[loading,setLoading]=React.useState(true);
  const[submitting,setSubmitting]=React.useState(false);
  const[pinStudent,setPinStudent]=React.useState(null);
  const[pinInput,setPinInput]=React.useState("");
  const[pinError,setPinError]=React.useState(false);
  const[missionsByDate,setMissionsByDate]=React.useState({});
  const[writingHistory,setWritingHistory]=React.useState([]);
  const[mathHistory,setMathHistory]=React.useState([]);
  const[missionHistory,setMissionHistory]=React.useState([]);
  const[allComments,setAllComments]=React.useState([]);
  const WRONG_REASONS=["계산 실수","개념 이해 부족","문제를 잘못 읽음","풀이 방법 모름","시간 부족","기타"];
  const dateKey=today();
  const student=students.find(s=>s.id===selectedId);
  const lineCount=writing.content.split("\n").filter(l=>l.trim()).length;

  React.useEffect(()=>{loadStudents();},[]);
  React.useEffect(()=>{
    if(!selectedId)return;
    loadTodayData();loadMission();loadMyComments();loadHistory();loadNotifications();
    const ch=sb.channel(`student-${selectedId}`)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`student_id=eq.${selectedId}`},()=>loadNotifications())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:`student_id=eq.${selectedId}`},()=>{loadMyComments();loadNotifications();})
      .on('postgres_changes',{event:'*',schema:'public',table:'missions'},()=>loadMission())
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[selectedId]);

  function checkPin(){
    if(pinInput===pinStudent.pin){setSelectedId(pinStudent.id);setPinStudent(null);setPinInput("");setPinError(false);}
    else{setPinError(true);setPinInput("");}
  }

  async function loadStudents(){const{data}=await sb.from("students").select("*").eq("class_id",CLASS_ID).order("sort_order",{nullsFirst:false}).order("created_at");setStudents(data||[]);setLoading(false);}
  async function loadMission(){const{data}=await sb.from("missions").select("*").eq("date",dateKey).eq("class_id",CLASS_ID).maybeSingle();if(data)setMissionText(data.content);}
  async function loadTodayData(){
    const{data:w}=await sb.from("writings").select("*").eq("student_id",selectedId).eq("date",dateKey).maybeSingle();
    if(w)setWriting({title:w.title||"",content:w.content||""});
    const{data:m}=await sb.from("maths").select("*").eq("student_id",selectedId).eq("date",dateKey).maybeSingle();
    if(m)setMath({wrong_count:m.wrong_count,wrong_reason:m.wrong_reason||"",memo:m.memo||"",done:m.done});
    const{data:ms}=await sb.from("mission_submissions").select("*").eq("student_id",selectedId).eq("date",dateKey).maybeSingle();
    if(ms)setMissionData({done:ms.done,comment:ms.comment||""});
  }
  async function loadMyComments(){
    const{data:wd}=await sb.from("comments").select("*").eq("student_id",selectedId).not("date","like","math_%").not("date","like","mission_%").order("created_at",{ascending:false}).limit(10);
    setMyComments(wd||[]);
    const{data:md}=await sb.from("comments").select("*").eq("student_id",selectedId).eq("date","math_"+today()).order("created_at",{ascending:true});
    setMyMathComments(md||[]);
    const{data:misd}=await sb.from("comments").select("*").eq("student_id",selectedId).eq("date","mission_"+today()).order("created_at",{ascending:true});
    setMyMissionComments(misd||[]);
  }
  async function loadHistory(){
    const sid=selectedId;
    const{data:ws}=await sb.from("writings").select("*").eq("student_id",sid).neq("date",dateKey).order("date",{ascending:false});setWritingHistory(ws||[]);
    const{data:ms}=await sb.from("maths").select("*").eq("student_id",sid).neq("date",dateKey).order("date",{ascending:false});setMathHistory(ms||[]);
    const{data:mis}=await sb.from("mission_submissions").select("*").eq("student_id",sid).neq("date",dateKey).order("date",{ascending:false});setMissionHistory(mis||[]);
    const{data:cs}=await sb.from("comments").select("*").eq("student_id",sid).order("created_at",{ascending:true});setAllComments(cs||[]);
    // 미션 내용 로드
    const allDates=[...(ws||[]).map(w=>w.date),...(ms||[]).map(m=>m.date),...(mis||[]).map(m=>m.date),dateKey];
    const uniqueDates=[...new Set(allDates)];
    if(uniqueDates.length>0){
      const{data:mData}=await sb.from("missions").select("date,content").eq("class_id",CLASS_ID).in("date",uniqueDates);
      const mg={};(mData||[]).forEach(m=>{mg[m.date]=m.content;});setMissionsByDate(mg);
    }
  }
  async function loadNotifications(){const{data}=await sb.from("notifications").select("*").eq("student_id",selectedId).eq("read",false).order("created_at",{ascending:false});setNotifications(data||[]);}
  async function markRead(){await sb.from("notifications").update({read:true}).eq("student_id",selectedId).eq("read",false);setNotifications([]);setShowNotif(false);loadMyComments();}
  async function saveWriting(){
    if(!writing.content.trim())return;setSubmitting(true);
    await sb.from("writings").upsert({student_id:selectedId,date:dateKey,title:writing.title,content:writing.content},{onConflict:"student_id,date"});
    setSubmitting(false);setSaved(p=>({...p,writing:true}));setTimeout(()=>setSaved(p=>({...p,writing:false})),2000);
  }
  async function saveMath(doneOverride){
    setSubmitting(true);
    const doneVal=doneOverride!==undefined?doneOverride:math.done;
    await sb.from("maths").upsert({student_id:selectedId,date:dateKey,wrong_count:math.wrong_count,wrong_reason:math.wrong_reason,memo:math.memo,done:doneVal},{onConflict:"student_id,date"});
    setSubmitting(false);setSaved(p=>({...p,math:true}));setTimeout(()=>setSaved(p=>({...p,math:false})),2000);
  }
  async function saveMission(doneOverride){
    setSubmitting(true);
    const doneVal=doneOverride!==undefined?doneOverride:missionData.done;
    await sb.from("mission_submissions").upsert({student_id:selectedId,date:dateKey,done:doneVal,comment:missionData.comment},{onConflict:"student_id,date"});
    setSubmitting(false);setSaved(p=>({...p,mission:true}));setTimeout(()=>setSaved(p=>({...p,mission:false})),2000);
  }

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><Spinner/></div>;

  if(!selectedId)return(
    <div className="student-select-wrap">
      <div className="ss-title">🌟 내 이름을 찾아요!</div>
      {pinStudent&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500}} onClick={()=>setPinStudent(null)}>
          <div style={{background:"#fff",borderRadius:20,padding:32,width:290,display:"flex",flexDirection:"column",gap:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center"}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:pinStudent.color,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700,color:"#fff",marginBottom:8}}>{pinStudent.name[0]}</div>
              <div style={{fontFamily:"'Gaegu',cursive",fontSize:22,color:"#2d3a2e"}}>{pinStudent.name}</div>
              <div style={{fontSize:13,color:"#aaa",marginTop:4}}>비밀번호를 입력하세요</div>
            </div>
            <input type="password" inputMode="numeric" maxLength={4} value={pinInput} autoFocus
              placeholder="●●●●"
              onChange={e=>setPinInput(e.target.value.replace(/[^0-9]/g,'').slice(0,4))}
              onKeyDown={e=>e.key==="Enter"&&checkPin()}
              style={{padding:"14px",borderRadius:12,border:pinError?"2px solid #e55":"2px solid #ddd",fontSize:24,textAlign:"center",outline:"none",letterSpacing:8,fontFamily:"inherit"}}/>
            {pinError&&<div style={{color:"#e55",fontSize:13,textAlign:"center",marginTop:-8}}>비밀번호가 틀렸어요 🙅</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setPinStudent(null)} style={{flex:1,padding:12,borderRadius:12,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>취소</button>
              <button onClick={checkPin} style={{flex:1,padding:12,borderRadius:12,border:"none",background:pinStudent.color,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>입장</button>
            </div>
          </div>
        </div>
      )}
      <div className="ss-grid">
        {students.map(s=>(
          <button key={s.id} className="ss-card" style={{background:s.color}} onClick={()=>{if(s.pin){setPinStudent(s);setPinInput("");setPinError(false);}else{setSelectedId(s.id);}}}>
            <div className="ss-avatar">{s.name[0]}</div>
            <div className="ss-card-name">{s.name}</div>
          </button>
        ))}
      </div>
      {students.length===0&&<div className="empty-msg">선생님이 아직 학생을 등록하지 않았어요 😊</div>}
    </div>
  );

  return(
    <div className="student-main">
      {notifications.length>0&&<div className="notif-banner" onClick={()=>setShowNotif(true)}>🔔 선생님 댓글이 달렸어요! 확인해보세요</div>}
      {showNotif&&(
        <div className="notif-overlay" onClick={markRead}>
          <div className="notif-modal" onClick={e=>e.stopPropagation()}>
            <div className="nm-title">💬 선생님 댓글</div>
            {myComments.slice(0,4).map(c=><div key={c.id} className="nm-item"><div className="nm-date">{c.date}</div><div className="nm-text">{c.text}</div></div>)}
            <button className="nm-close" onClick={markRead}>확인! ✓</button>
          </div>
        </div>
      )}
      <header className="s-header" style={{background:student.color}}>
        <button className="back-s-btn" onClick={()=>{setSelectedId(null);setWriting({title:"",content:""});setMath({wrong_count:0,wrong_reason:"",memo:"",done:false});setMissionData({done:false,comment:""});}}>←</button>
        <div className="s-header-name">{student.name}의 오늘</div>
        {myComments.length>0&&<button className="s-fb-badge" onClick={()=>setShowNotif(true)}>💬 {myComments.length}{notifications.length>0&&<span className="unread-dot"/>}</button>}
      </header>
      <nav className="s-tabs">
        {[{key:"writing",label:"✏️ 글쓰기"},{key:"math",label:"🔢 수학"},{key:"mission",label:"🎯 미션"}].map(t=>(
          <button key={t.key} className={`s-tab-btn ${tab===t.key?"active":""}`} style={tab===t.key?{borderBottom:`3px solid ${student.color}`,color:student.color}:{}} onClick={()=>setTab(t.key)}>{t.label}</button>
        ))}
      </nav>
      <div className="s-body">
        {tab==="writing"&&(
          <div className="writing-tab">
            <div className="notebook-paper">
              <div className="np-redline"/>
              <input className="np-title-input" placeholder="제목을 써 보세요 ✍️" value={writing.title} onChange={e=>setWriting({...writing,title:e.target.value})}/>
              <div className="np-rule"/>
              <textarea className="np-content" rows={8} placeholder="오늘 있었던 일, 생각, 느낌을 자유롭게 써 보세요!" value={writing.content} onChange={e=>setWriting({...writing,content:e.target.value})}/>
              <div className="np-footer"><span className={`line-counter ${lineCount>=3?"ok":"warn"}`}>{lineCount}줄 {lineCount>=3?"✓":"(3줄 이상 권장)"}</span></div>
            </div>
            <button className="submit-btn" style={{background:student.color}} onClick={saveWriting} disabled={!writing.content.trim()||submitting}>{saved.writing?"✓ 저장됐어요!":submitting?"저장 중…":"📤 제출하기"}</button>
            {myComments.filter(c=>c.date===dateKey).length>0&&(
              <div className="s-comment-preview"><div className="scp-label">💬 선생님 댓글</div>{myComments.filter(c=>c.date===dateKey).map(c=><div key={c.id} className="scp-item"><div className="scp-text">{c.text}</div></div>)}</div>
            )}
            {writingHistory.length>0&&(
              <div style={{marginTop:24}}>
                <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:12,borderTop:"2px dashed #eee",paddingTop:16}}>📚 이전 글</div>
                {writingHistory.map(w=>{const wc=allComments.filter(c=>c.date===w.date);return(
                  <div key={w.id} style={{background:"#fff",borderRadius:14,padding:20,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderLeft:`3px solid ${student.color}`}}>
                    <div style={{fontSize:11,color:"#c8a96e",fontWeight:700,marginBottom:6}}>{w.date}</div>
                    {w.title&&<div style={{fontFamily:"'Gaegu',cursive",fontSize:20,color:"#2d3a2e",marginBottom:8}}>{w.title}</div>}
                    <div style={{fontSize:14,lineHeight:1.9,color:"#333",whiteSpace:"pre-wrap"}}>{w.content}</div>
                    {wc.length>0&&<div style={{marginTop:12,padding:"10px 14px",background:"#f0f7f0",borderRadius:10}}><div style={{fontSize:11,fontWeight:700,color:"#4a7a4e",marginBottom:6}}>💬 선생님 댓글</div>{wc.map(c=><div key={c.id} style={{fontSize:13,lineHeight:1.8,color:"#333",whiteSpace:"pre-wrap"}}>{c.text}</div>)}</div>}
                  </div>
                );})}
              </div>
            )}
          </div>
        )}
        {tab==="math"&&(
          <div className="math-tab">
            <div className="math-card">
              <div className="mc-label">오늘 틀린 문제가 몇 개예요?</div>
              <div className="wrong-count-row">{[0,1,2,3,4,5,"6+"].map(n=><button key={n} className={`wc-btn ${math.wrong_count===n?"active":""}`} style={math.wrong_count===n?{background:student.color,color:"#fff",borderColor:student.color}:{}} onClick={()=>setMath({...math,wrong_count:n})}>{n}개</button>)}</div>
            </div>
            {math.wrong_count!==0&&<div className="math-card"><div className="mc-label">왜 틀렸을까요?</div><div className="reason-grid">{WRONG_REASONS.map(r=><button key={r} className={`reason-btn ${math.wrong_reason===r?"active":""}`} style={math.wrong_reason===r?{background:student.color,color:"#fff",borderColor:student.color}:{}} onClick={()=>setMath({...math,wrong_reason:r})}>{r}</button>)}</div></div>}
            <div className="math-card"><div className="mc-label">선생님께 하고 싶은 말 (선택)</div><textarea className="mission-comment-input" placeholder="오늘 수학 어땠어요?" value={math.memo} onChange={e=>setMath({...math,memo:e.target.value})}/></div>
            <button className="submit-btn" style={{background:student.color}} onClick={()=>{setMath(m=>({...m,done:true}));saveMath(true);}} disabled={submitting}>{saved.math?"✓ 저장됐어요!":submitting?"저장 중…":"📤 오답 완료 & 제출"}</button>
            {myMathComments.length>0&&<div className="s-comment-preview"><div className="scp-label">💬 선생님 댓글</div>{myMathComments.map(c=><div key={c.id} className="scp-item"><div className="scp-text">{c.text}</div></div>)}</div>}
            {mathHistory.length>0&&(
              <div style={{marginTop:24}}>
                <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:12,borderTop:"2px dashed #eee",paddingTop:16}}>🔢 이전 수학 기록</div>
                {mathHistory.map(m=>{const mc=allComments.filter(c=>c.date==="math_"+m.date);return(
                  <div key={m.id} style={{background:"#fff",borderRadius:14,padding:20,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderLeft:`3px solid ${student.color}`}}>
                    <div style={{fontSize:11,color:"#c8a96e",fontWeight:700,marginBottom:8}}>{m.date}</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
                      <span style={{background:"#f0f0f0",borderRadius:20,padding:"3px 10px",fontSize:13}}>틀린 문제 {m.wrong_count}개</span>
                      {m.wrong_reason&&<span style={{background:"#f0f0f0",borderRadius:20,padding:"3px 10px",fontSize:13}}>{m.wrong_reason}</span>}
                      {m.done&&<span style={{background:"#e8f5e9",color:"#2d7a40",borderRadius:20,padding:"3px 10px",fontSize:13,fontWeight:700}}>✓ 오답 완료</span>}
                    </div>
                    {m.memo&&<div style={{fontSize:13,color:"#555",lineHeight:1.7,marginTop:6}}>{m.memo}</div>}
                    {mc.length>0&&<div style={{marginTop:12,padding:"10px 14px",background:"#f0f7f0",borderRadius:10}}><div style={{fontSize:11,fontWeight:700,color:"#4a7a4e",marginBottom:6}}>💬 선생님 댓글</div>{mc.map(c=><div key={c.id} style={{fontSize:13,lineHeight:1.8,color:"#333",whiteSpace:"pre-wrap"}}>{c.text}</div>)}</div>}
                  </div>
                );})}
              </div>
            )}
          </div>
        )}
        {tab==="mission"&&(
          <div className="mission-tab">
            <div className="mission-banner" style={{background:student.color+"22",borderColor:student.color}}>
              <div className="mb-label">🎯 오늘의 미션</div>
              <div className="mb-text">{missionText}</div>
            </div>
            <div className="mc-label" style={{marginTop:8}}>한마디 (선택)</div>
            <textarea className="mission-comment-input" placeholder="미션 하고 나서 느낌을 써 보세요!" value={missionData.comment} onChange={e=>setMissionData({...missionData,comment:e.target.value})}/>
            <button className="submit-btn" style={{background:student.color}} onClick={()=>{setMissionData(m=>({...m,done:true}));saveMission(true);}} disabled={submitting}>{saved.mission?"✓ 저장됐어요!":submitting?"저장 중…":"🎯 미션 완료 & 제출"}</button>
            {myMissionComments.length>0&&<div className="s-comment-preview"><div className="scp-label">💬 선생님 댓글</div>{myMissionComments.map(c=><div key={c.id} className="scp-item"><div className="scp-text">{c.text}</div></div>)}</div>}
            {missionHistory.length>0&&(
              <div style={{marginTop:24}}>
                <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:12,borderTop:"2px dashed #eee",paddingTop:16}}>🎯 이전 미션 기록</div>
                {missionHistory.map(ms=>{const msc=allComments.filter(c=>c.date==="mission_"+ms.date);return(
                  <div key={ms.id} style={{background:"#fff",borderRadius:14,padding:20,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderLeft:`3px solid ${student.color}`}}>
                    <div style={{fontSize:11,color:"#c8a96e",fontWeight:700,marginBottom:8}}>{ms.date}</div>
                    {missionsByDate[ms.date]&&<div style={{borderRadius:12,border:`2px solid ${student.color}`,background:student.color+"22",padding:"10px 14px",marginBottom:8}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:4}}>🎯 그날의 미션</div>
                      <div style={{fontFamily:"'Gaegu',cursive",fontSize:18,color:"#2d3a2e"}}>{missionsByDate[ms.date]}</div>
                    </div>}
                    {ms.done&&<span style={{background:"#e8f5e9",color:"#2d7a40",borderRadius:20,padding:"3px 10px",fontSize:13,fontWeight:700,display:"inline-block",marginBottom:6}}>✓ 미션 완료</span>}
                    {ms.comment&&<div style={{fontSize:13,color:"#555",lineHeight:1.7,marginTop:6}}>{ms.comment}</div>}
                    {msc.length>0&&<div style={{marginTop:12,padding:"10px 14px",background:"#f0f7f0",borderRadius:10}}><div style={{fontSize:11,fontWeight:700,color:"#4a7a4e",marginBottom:6}}>💬 선생님 댓글</div>{msc.map(c=><div key={c.id} style={{fontSize:13,lineHeight:1.8,color:"#333",whiteSpace:"pre-wrap"}}>{c.text}</div>)}</div>}
                  </div>
                );})}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[mode,setMode]=React.useState(null);
  const[showPwModal,setShowPwModal]=React.useState(false);
  const[pwInput,setPwInput]=React.useState("");
  const[pwError,setPwError]=React.useState(false);
  const[classConfig,setClassConfig]=React.useState(null);
  const[classLoading,setClassLoading]=React.useState(true);
  const[showSetup,setShowSetup]=React.useState(false);
  const[setupName,setSetupName]=React.useState("");
  const[setupPw,setSetupPw]=React.useState("");
  const[setupSaving,setSetupSaving]=React.useState(false);

  React.useEffect(()=>{loadClass();},[]);
  async function loadClass(){const{data}=await sb.from("classrooms").select("*").eq("class_id",CLASS_ID).maybeSingle();if(data){setClassConfig(data);}else{setShowSetup(true);}setClassLoading(false);}
  async function createClass(){
    if(!setupName.trim()||!setupPw.trim())return;setSetupSaving(true);
    const{data}=await sb.from("classrooms").insert({class_id:CLASS_ID,class_name:setupName.trim(),teacher_pw:setupPw.trim()}).select().single();
    if(data){setClassConfig(data);setShowSetup(false);}setSetupSaving(false);
  }

  if(classLoading)return <div className="spinner"><div className="spin-circle"/></div>;
  if(showSetup)return(
    <div className="landing"><div className="landing-inner" style={{gap:20}}>
      <div className="landing-emoji">🏫</div>
      <h1 className="landing-title" style={{fontSize:36}}>반 첫 설정</h1>
      <p className="landing-sub" style={{fontSize:15}}>반 코드: <b>{CLASS_ID}</b></p>
      <div style={{display:"flex",flexDirection:"column",gap:12,width:280}}>
        <input placeholder="반 이름 (예: 3학년 2반)" value={setupName} onChange={e=>setSetupName(e.target.value)} style={{padding:"12px 16px",borderRadius:12,border:"2px solid #ddd",fontSize:15,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}/>
        <input type="password" placeholder="선생님 비밀번호 설정" value={setupPw} onChange={e=>setSetupPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createClass()} style={{padding:"12px 16px",borderRadius:12,border:"2px solid #ddd",fontSize:15,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}/>
        <button onClick={createClass} disabled={setupSaving||!setupName.trim()||!setupPw.trim()} style={{padding:"14px",background:"#2d3a2e",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif",opacity:(setupSaving||!setupName.trim()||!setupPw.trim())?0.5:1}}>{setupSaving?"저장 중...":"우리 교실 만들기 🎉"}</button>
      </div>
    </div></div>
  );

  const TEACHER_PW=classConfig.teacher_pw;const CLASS_NAME=classConfig.class_name;
  function tryTeacher(){if(pwInput===TEACHER_PW){setShowPwModal(false);setPwInput("");setPwError(false);setMode("teacher");}else{setPwError(true);setPwInput("");}}

  if(!mode)return(
    <div className="landing"><div className="landing-inner">
      <div className="landing-emoji">{classConfig.emoji||"📚"}</div>
      <h1 className="landing-title">{CLASS_NAME}</h1>
      <p className="landing-sub">누구세요?</p>
      <div className="landing-btns">
        <button className="land-btn teacher" onClick={()=>{setShowPwModal(true);setPwError(false);setPwInput("");}}>
          <span className="lb-icon">👩‍🏫</span><span className="lb-label">선생님</span>
        </button>
        <button className="land-btn student" onClick={()=>setMode("student")}>
          <span className="lb-icon">🧒</span><span className="lb-label">학생</span>
        </button>
      </div>
    </div>
    {showPwModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500}}>
        <div style={{background:"#fff",borderRadius:20,padding:32,width:300,display:"flex",flexDirection:"column",gap:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
          <div style={{fontFamily:"'Gaegu',cursive",fontSize:22,color:"#2d3a2e"}}>🔑 선생님 확인</div>
          <input type="password" placeholder="비밀번호를 입력하세요" value={pwInput} autoFocus onChange={e=>{setPwInput(e.target.value);setPwError(false);}} onKeyDown={e=>e.key==="Enter"&&tryTeacher()} style={{padding:"12px 14px",borderRadius:12,border:pwError?"2px solid #e55":"2px solid #ddd",fontSize:15,outline:"none",fontFamily:"inherit"}}/>
          {pwError&&<div style={{color:"#e55",fontSize:13,textAlign:"center"}}>비밀번호가 틀렸어요 🙅</div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowPwModal(false)} style={{flex:1,padding:12,borderRadius:12,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>취소</button>
            <button onClick={tryTeacher} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#2d3a2e",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>입장</button>
          </div>
        </div>
      </div>
    )}
    </div>
  );

  return(
    <div className="app-root">
      <div className="mode-switch"><button className="mode-back-btn" onClick={()=>setMode(null)}>← 처음으로</button></div>
      {mode==="teacher"?<TeacherView/>:<StudentView/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
