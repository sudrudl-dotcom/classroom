<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 교실</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f5f0;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
#root{min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f5f0;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}

/* 스피너 */
.spinner{display:flex;align-items:center;justify-content:center;padding:40px}
.spin-circle{width:36px;height:36px;border:3px solid #eee;border-top-color:#4a7a4e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 랜딩 */
.landing{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff9f0,#f0f7ff)}
.landing-inner{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.landing-emoji{font-size:64px;animation:bounce 1.6s infinite ease-in-out}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.landing-title{font-family:'Gaegu',cursive;font-size:52px;color:#2d3a2e}
.landing-sub{font-size:18px;color:#888}
.landing-btns{display:flex;gap:24px;margin-top:8px}
.land-btn{display:flex;flex-direction:column;align-items:center;gap:10px;width:140px;padding:28px 16px;border-radius:24px;border:none;cursor:pointer;transition:transform .18s,box-shadow .18s;font-family:'Noto Sans KR',sans-serif}
.land-btn:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,.13)}
.land-btn.teacher{background:#2d3a2e;color:#fff}
.land-btn.student{background:#fff;color:#2d3a2e;border:2px solid #2d3a2e}
.lb-icon{font-size:36px}.lb-label{font-size:18px;font-weight:700}

.app-root{min-height:100vh;background:#f7f5f0}
.mode-switch{position:fixed;top:12px;right:12px;z-index:200}
.mode-back-btn{background:rgba(255,255,255,.9);border:1px solid #ddd;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* 선생님 */
.teacher-wrap{min-height:100vh}
.t-header{background:#2d3a2e;color:#fff;padding:0 24px;display:flex;align-items:center;gap:24px;height:60px;position:sticky;top:0;z-index:100}
.t-logo{font-family:'Gaegu',cursive;font-size:22px;color:#a8d5a2;white-space:nowrap}
.t-nav{display:flex;gap:4px}
.t-nav-btn{background:none;border:none;color:#aaccaa;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.t-nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.t-nav-btn.active{background:rgba(255,255,255,.15);color:#fff}

.writings-layout{display:flex;height:calc(100vh - 60px)}
.writings-sidebar{width:190px;flex-shrink:0;background:#fff;border-right:1px solid #eee;overflow-y:auto;padding:16px 0}
.ws-title{font-size:11px;font-weight:700;color:#aaa;padding:0 16px 10px;text-transform:uppercase;letter-spacing:.05em}
.ws-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;cursor:pointer;transition:background .12s}
.ws-item:hover{background:#f5f5f5}
.ws-item.active{background:#f0f7f0}
.ws-name{font-weight:600;color:#2d3a2e;font-size:14px}
.ws-badges-mini{display:flex;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;background:#e0e0e0}
.dot.on{background:#4a7a4e}
.ws-empty{padding:20px 16px;font-size:13px;color:#bbb}

.writings-main{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column}
.no-select{color:#bbb;font-size:15px;text-align:center;margin:80px auto}
.wm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #eee}
.wm-name{font-family:'Gaegu',cursive;font-size:32px;font-weight:700}
.wm-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.wm-count{font-size:13px;color:#aaa}

.copy-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fafafa;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#888;transition:all .15s;white-space:nowrap}
.copy-btn:hover{border-color:#4a7a4e;color:#2d3a2e;background:#f0f7f0}
.copy-btn.copied{border-color:#4a7a4e;background:#e8f5e9;color:#2a7a40;font-weight:600}

.entry-card{background:#fff;border-radius:16px;padding:28px 32px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #f0ede8}
.ec-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ec-date{font-size:11px;color:#c8a96e;letter-spacing:.08em;font-weight:600}
.ec-title{font-family:'Gaegu',cursive;font-size:26px;color:#2d3a2e;margin-bottom:14px;line-height:1.3}
.ec-content{font-size:15px;line-height:2.1;color:#333;white-space:pre-wrap;margin-bottom:12px;user-select:text;cursor:text}

.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-top:16px;border-top:1px dashed #eee}
.comment-item{display:flex;gap:12px;align-items:flex-start}
.ci-avatar{flex-shrink:0;background:#2d3a2e;color:#fff;font-size:11px;font-weight:700;padding:5px 8px;border-radius:8px}
.ci-body{flex:1}
.ci-text{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap}
.ci-meta{display:flex;align-items:center;gap:10px;margin-top:4px}
.ci-meta span{font-size:11px;color:#bbb}
.ci-del{background:none;border:none;font-size:11px;color:#ddd;cursor:pointer}
.ci-del:hover{color:#e55}

.comment-input-area{padding-top:16px;border-top:1px dashed #eee;display:flex;flex-direction:column;gap:8px}
.comment-textarea{width:100%;min-height:80px;padding:12px 14px;border:1.5px solid #e0e8e0;border-radius:12px;font-size:14px;line-height:1.7;resize:vertical;outline:none;font-family:'Noto Sans KR',sans-serif;transition:border .15s}
.comment-textarea:focus{border-color:#4a7a4e}
.comment-btns{display:flex;justify-content:flex-end}
.send-comment-btn{padding:10px 22px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;color:#fff;font-family:'Noto Sans KR',sans-serif}
.send-comment-btn:disabled{opacity:.35;cursor:not-allowed}

.t-content{max-width:860px;margin:0 auto;padding:28px 24px;display:flex;flex-direction:column;gap:28px}
.t-section{display:flex;flex-direction:column;gap:14px}
.section-title{font-size:18px;font-weight:700;color:#2d3a2e}
.mission-edit{display:flex;gap:10px}
.mission-input{flex:1;padding:12px 16px;border-radius:12px;border:2px solid #ddd;font-size:15px;outline:none;font-family:'Noto Sans KR',sans-serif}
.mission-input:focus{border-color:#4a7a4e}
.mission-save-btn{padding:12px 24px;background:#2d3a2e;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif}
.add-row{display:flex;gap:10px}
.add-input{flex:1;padding:12px 16px;border-radius:12px;border:2px solid #ddd;font-size:15px;outline:none;font-family:'Noto Sans KR',sans-serif}
.add-confirm-btn{padding:12px 20px;background:#4a7a4e;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.student-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:8px}
.sc-name{font-weight:700;font-size:16px;color:#2d3a2e}
.sc-today-label{font-size:11px;color:#aaa;font-weight:600}
.sc-badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;background:#f0f0f0;color:#aaa}
.badge.on{background:#e8f5e9;color:#2d3a2e}
.del-s-btn{align-self:flex-end;background:none;border:1px solid #eee;border-radius:8px;padding:3px 10px;font-size:12px;cursor:pointer;color:#aaa}
.del-s-btn:hover{background:#ffeeee;color:#e55;border-color:#ffbbbb}

/* 학생 */
.student-select-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#fffdf7;padding:40px 20px}
.ss-title{font-family:'Gaegu',cursive;font-size:38px;color:#2d3a2e}
.ss-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:560px}
.ss-card{width:100px;height:118px;border-radius:20px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .18s,box-shadow .18s;font-family:'Noto Sans KR',sans-serif}
.ss-card:hover{transform:translateY(-5px) scale(1.04);box-shadow:0 10px 28px rgba(0,0,0,.15)}
.ss-avatar{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
.ss-card-name{font-size:14px;font-weight:700;color:#fff}
.empty-msg{color:#bbb;font-size:15px;text-align:center;padding:40px}

.notif-banner{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#e07b6a;color:#fff;padding:12px 28px;border-radius:24px;font-size:14px;font-weight:700;z-index:200;cursor:pointer;box-shadow:0 4px 20px rgba(224,123,106,.5);animation:slidein .3s ease;white-space:nowrap}
@keyframes slidein{from{bottom:0;opacity:0}to{bottom:24px;opacity:1}}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300}
.notif-modal{background:#fff;border-radius:20px;padding:28px;max-width:380px;width:90%;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.nm-title{font-family:'Gaegu',cursive;font-size:24px;color:#2d3a2e}
.nm-item{background:#f0f7f0;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:4px}
.nm-date{font-size:11px;color:#5B9E8F;font-weight:700}
.nm-text{font-size:14px;line-height:1.8;color:#333}
.nm-close{background:#2d3a2e;color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

.s-header{display:flex;align-items:center;gap:12px;padding:0 20px;height:56px;position:sticky;top:0;z-index:50}
.back-s-btn{background:rgba(255,255,255,.3);border:none;color:#fff;border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.s-header-name{font-family:'Gaegu',cursive;font-size:22px;color:#fff;flex:1}
.s-fb-badge{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;position:relative}
.unread-dot{width:8px;height:8px;background:#ff4757;border-radius:50%;position:absolute;top:-2px;right:-2px}

.s-tabs{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:56px;z-index:40}
.s-tab-btn{flex:1;padding:14px 8px;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;color:#aaa;transition:all .15s}
.s-body{padding:24px 20px;max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.writing-tab{display:flex;flex-direction:column;gap:16px}
.notebook-paper{background:#fff;border-radius:16px;padding:24px 24px 16px;box-shadow:0 4px 20px rgba(0,0,0,.07);position:relative;overflow:hidden;background-image:repeating-linear-gradient(transparent,transparent 31px,#e4f0e4 31px,#e4f0e4 32px);background-position:0 42px}
.np-redline{position:absolute;left:56px;top:0;bottom:0;width:2px;background:#ffb3ba;opacity:.5}
.np-title-input{width:100%;border:none;outline:none;font-family:'Gaegu',cursive;font-size:24px;color:#2d3a2e;padding:0 0 12px 64px;background:transparent;border-bottom:2px dashed #e0e0e0;line-height:32px}
.np-title-input::placeholder{color:#ccc}
.np-rule{height:12px}
.np-content{width:100%;min-height:180px;border:none;outline:none;resize:none;font-family:'Noto Sans KR',sans-serif;font-size:15px;line-height:32px;color:#333;background:transparent;padding:0 0 0 64px}
.np-content::placeholder{color:#ccc}
.np-footer{display:flex;justify-content:flex-end;padding-top:10px}
.line-counter{font-size:12px;padding:4px 12px;border-radius:20px}
.line-counter.ok{color:#4a7a4e;background:#e8f5e9}
.line-counter.warn{color:#b8860b;background:#fff8e1}

.submit-btn{width:100%;padding:16px;border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:transform .15s,box-shadow .15s}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

.s-comment-preview{background:#f0f7f0;border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.scp-label{font-size:12px;font-weight:700;color:#4a7a4e}
.scp-item{display:flex;flex-direction:column;gap:4px}
.scp-text{font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap}

.math-tab{display:flex;flex-direction:column;gap:16px}
.math-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.mc-label{font-size:15px;font-weight:700;color:#2d3a2e;margin-bottom:14px}
.wrong-count-row{display:flex;gap:8px;flex-wrap:wrap}
.wc-btn{width:52px;height:52px;border-radius:12px;border:2px solid #e0e0e0;background:#fafafa;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.reason-btn{padding:12px;border-radius:12px;border:2px solid #e0e0e0;background:#fafafa;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:all .15s}
.done-btn{width:100%;padding:16px;border-radius:14px;border:2px solid #ddd;background:#fafafa;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#2d3a2e;transition:all .2s}

.mission-tab{display:flex;flex-direction:column;gap:16px}
.mission-banner{border-radius:16px;border:2px solid;padding:20px}
.mb-label{font-size:12px;font-weight:700;color:#888;margin-bottom:6px}
.mb-text{font-family:'Gaegu',cursive;font-size:22px;color:#2d3a2e}
.mission-comment-input{width:100%;min-height:90px;padding:14px;border-radius:14px;border:2px solid #e0e0e0;font-size:14px;line-height:1.8;resize:none;outline:none;font-family:'Noto Sans KR',sans-serif;background:#fff}
.mission-comment-input:focus{border-color:#4a7a4e}

/* 모바일 */
@media(max-width:600px){
  .landing-title{font-size:34px}
  .landing-emoji{font-size:52px}
  .land-btn{width:120px;padding:22px 12px}
  .t-header{padding:0 8px;gap:8px;height:52px}
  .t-logo{display:none}
  .t-nav-btn{padding:6px 8px;font-size:11px}
  .writings-layout{flex-direction:column;height:auto;min-height:100vh}
  .writings-sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid #eee;padding:8px 0;display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden}
  .ws-title{display:none}
  .ws-item{flex-direction:column;align-items:center;padding:8px 14px;min-width:60px;border-left:none !important;border-bottom:3px solid transparent;white-space:nowrap;gap:4px}
  .ws-item.active{background:#f0f7f0;border-bottom:3px solid #4a7a4e}
  .writings-main{padding:12px}
  .wm-header{flex-direction:column;align-items:flex-start;gap:10px;margin-bottom:16px}
  .wm-name{font-size:24px}
  .entry-card{padding:16px 14px}
  .ec-title{font-size:19px}
  .ec-content{font-size:14px;line-height:1.9}
  .t-content{padding:12px}
  .mission-edit,.add-row{flex-direction:column}
  .mission-save-btn,.add-confirm-btn{width:100%}
  .student-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .student-card{padding:12px}
  .ss-title{font-size:28px}
  .ss-card{width:80px;height:96px}
  .ss-avatar{width:38px;height:38px;font-size:18px}
  .ss-card-name{font-size:12px}
  .s-header{height:50px;padding:0 14px}
  .s-header-name{font-size:19px}
  .s-tabs{top:50px}
  .s-tab-btn{font-size:11px;padding:11px 4px}
  .s-body{padding:16px 14px;gap:12px}
  .np-redline{display:none}
  .np-title-input{padding:0 0 12px 0;font-size:20px}
  .np-content{padding:0;font-size:14px;line-height:28px}
  .notebook-paper{padding:18px 16px 12px;background-position:0 38px}
  .notif-banner{width:88%;text-align:center;font-size:13px;padding:10px 14px;bottom:16px}
  .wc-btn{width:44px;height:44px;font-size:12px}
  .reason-grid{grid-template-columns:1fr 1fr}
  .math-card{padding:16px}
  .mission-banner{padding:16px}
  .done-btn{padding:14px;font-size:14px}
  .submit-btn{padding:14px;font-size:15px}
  .comment-item{gap:8px}
  .notif-modal{padding:20px;max-width:340px}
  .mode-switch{top:9px;left:auto;right:8px}
}

  </style>
</head>

  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");

// ─── 복사 버튼 ────────────────────────────────────────────────────────────────
function CopyBtn({ text, label = "복사" }) {
  const [copied, setCopied] = React.useState(false);
  return (
    <button className={`copy-btn ${copied?"copied":""}`}
      onClick={() => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),1800); }}>
      {copied ? "✓ 복사됨" : label}
    </button>
  );
}

  const [selectedId, setSelectedId] = React.useState(null);
  const [writings, setWritings] = React.useState([]);
  const [comments, setComments] = React.useState({});
  const [commentDraft, setCommentDraft] = React.useState({});
  const [mission, setMission] = React.useState("오늘의 미션을 입력하세요");
  const [missionSaved, setMissionSaved] = React.useState(false);
  const [missionDate, setMissionDate] = React.useState(today());
  const [newName, setNewName] = React.useState("");
  const [loading, setLoading] = React.useState(true);
  const [sending, setSending] = React.useState({});
  const [todaySubs, setTodaySubs] = React.useState({});
  const [addError, setAddError] = React.useState("");
  const [adding, setAdding] = React.useState(false);
  const [editClassName, setEditClassName] = React.useState("");
  const [editEmoji, setEditEmoji] = React.useState("📚");
  const [classSaving, setClassSaving] = React.useState(false);
  const [mathDetail, setMathDetail] = React.useState({});      // {studentId: {wrong_count,wrong_reason,memo,done}}
  const [missionDetail, setMissionDetail] = React.useState({}); // {studentId: {done,comment}}
  const [mathComments, setMathComments] = React.useState({});   // {studentId: [comments]}
  const [missionComments, setMissionComments] = React.useState({}); // {studentId: [comments]}
  const [mathCommentDraft, setMathCommentDraft] = React.useState({});
  const [missionCommentDraft, setMissionCommentDraft] = React.useState({});
  const [detailTab, setDetailTab] = React.useState("math");

  const dateKey = today();
  const selected = students.find(s => s.id === selectedId);

  // 학생 목록 불러오기
  React.useEffect(() => {
    loadStudents();
    loadClassSettings();
    loadMission();
  }, []);

  // 학생 선택시 글 불러오기
  React.useEffect(() => {
    if (selectedId) loadWritings(selectedId);
  }, [selectedId]);

  // 오늘 제출 현황
  React.useEffect(() => {
    if (students.length > 0) loadTodaySubs();
  }, [students]);

  // 실시간 구독 설정
  React.useEffect(() => {
    // writings, maths, mission_submissions 변경 시 오늘 현황 새로고침
    const channel = sb.channel('teacher-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'writings' }, () => {
        loadTodaySubs();
        if (selectedId) loadWritings(selectedId);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'maths' }, () => {
        loadTodaySubs();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'mission_submissions' }, () => {
        loadTodaySubs();
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, () => {
        if (selectedId) loadWritings(selectedId);
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [selectedId]);


  async function loadClassSettings() {
    const { data } = await sb.from("classrooms").select("*").eq("class_id", CLASS_ID).maybeSingle();
    if (data) { setEditClassName(data.class_name || ""); setEditEmoji(data.emoji || "📚"); }
  }

  async function loadStudents() {
    setLoading(true);
    const { data } = await sb.from("students").select("*").eq("class_id", CLASS_ID).order("sort_order", {nullsFirst:false}).order("created_at");
    setStudents(data || []);
    setLoading(false);
  }

  async function loadMission(date) {
    const d = date || missionDate || today();
    const { data } = await sb.from("missions").select("*").eq("date", d).eq("class_id", CLASS_ID).maybeSingle();
    setMission(data ? data.content : "");
  }

  async function loadWritings(studentId) {
    const { data } = await sb.from("writings").select("*")
      .eq("student_id", studentId).order("date", { ascending: false });
    setWritings(data || []);
    // 각 글의 댓글도 불러오기
    const dates = (data||[]).map(w => w.date);
    if (dates.length > 0) {
      const { data: cData } = await sb.from("comments").select("*")
        .eq("student_id", studentId).in("date", dates).order("created_at");
      const grouped = {};
      (cData||[]).forEach(c => {
        if (!grouped[c.date]) grouped[c.date] = [];
        grouped[c.date].push(c);
      });
      setComments(grouped);
    } else {
      setComments({});
    }
  }

  async function loadTodaySubs() {
    const ids = students.map(s => s.id);
    const { data: wData } = await sb.from("writings").select("student_id").in("student_id", ids).eq("date", dateKey);
    const { data: mData } = await sb.from("maths").select("*").in("student_id", ids).eq("date", dateKey);
    const { data: msData } = await sb.from("mission_submissions").select("*").in("student_id", ids).eq("date", dateKey);
    const subs = {};
    const mDetail = {};
    const msDetail = {};
    ids.forEach(id => {
      const m = (mData||[]).find(m => m.student_id === id);
      const ms = (msData||[]).find(m => m.student_id === id);
      subs[id] = {
        writing: !!(wData||[]).find(w => w.student_id === id),
        math: !!(m && m.done),
        mission: !!(ms && ms.done),
      };
      if (m) mDetail[id] = m;
      if (ms) msDetail[id] = ms;
    });
    setTodaySubs(subs);
    setMathDetail(mDetail);
    setMissionDetail(msDetail);
    // 수학/미션 댓글 로드
    const { data: mcData } = await sb.from("comments").select("*").in("student_id", ids).eq("date", "math_"+dateKey).order("created_at");
    const { data: mscData } = await sb.from("comments").select("*").in("student_id", ids).eq("date", "mission_"+dateKey).order("created_at");
    const mc = {}; const msc = {};
    (mcData||[]).forEach(c => { if(!mc[c.student_id]) mc[c.student_id]=[]; mc[c.student_id].push(c); });
    (mscData||[]).forEach(c => { if(!msc[c.student_id]) msc[c.student_id]=[]; msc[c.student_id].push(c); });
    setMathComments(mc);
    setMissionComments(msc);
  }

  async function addStudent() {
    const n = newName.trim(); if (!n) return;
    setAdding(true); setAddError("");
    const color = COLORS[students.length % COLORS.length];
    const maxOrder = students.length > 0 ? Math.max(...students.map(s => s.sort_order ?? 0)) : 0;
    const { data, error } = await sb.from("students").insert({ name: n, color, class_id: CLASS_ID, sort_order: maxOrder + 1 }).select().single();
    setAdding(false);
    if (error) { setAddError("등록 실패: " + (error.message || error.code || JSON.stringify(error))); return; }
    if (data) { setStudents(p => [...p, data]); setNewName(""); }
  }

  async function saveClassConfig() {
    setClassSaving(true);
    await sb.from("classrooms").update({
      class_name: editClassName.trim() || "우리 교실",
      emoji: editEmoji.trim() || "📚"
    }).eq("class_id", CLASS_ID);
    setClassSaving(false);
    // 즉시 반영 - 페이지 새로고침
    window.location.reload();
  }

  async function removeStudent(id) {
    await sb.from("students").delete().eq("id", id);
    setStudents(p => p.filter(s => s.id !== id));
    if (selectedId === id) { setSelectedId(null); setWritings([]); }
  }

  const dragSrcId = React.useRef(null);
  const [dragOverId, setDragOverId] = React.useState(null);

  async function doReorder(fromId, toId) {
    if (!fromId || !toId || fromId === toId) return;
    const fromIdx = students.findIndex(s => s.id === fromId);
    const toIdx   = students.findIndex(s => s.id === toId);
    if (fromIdx < 0 || toIdx < 0) return;
    const reordered = [...students];
    const [moved] = reordered.splice(fromIdx, 1);
    reordered.splice(toIdx, 0, moved);
    const withOrder = reordered.map((s, i) => ({ ...s, sort_order: i + 1 }));
    setStudents(withOrder);
    setDragOverId(null);
    dragSrcId.current = null;
    await Promise.all(withOrder.map(s =>
      sb.from("students").update({ sort_order: s.sort_order }).eq("id", s.id)
    ));
  }

  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const card = el && el.closest('[data-sid]');
    if (card) setDragOverId(card.getAttribute('data-sid'));
  }

  async function saveMission() {
    const d = missionDate || today();
    const { data: existing } = await sb.from("missions")
      .select("id").eq("date", d).eq("class_id", CLASS_ID).maybeSingle();
    let error;
    if (existing) {
      ({ error } = await sb.from("missions").update({ content: mission }).eq("id", existing.id));
    } else {
      ({ error } = await sb.from("missions").insert({ content: mission, date: d, class_id: CLASS_ID }));
    }
    if (error) { alert("미션 저장 실패: " + error.message); return; }
    setMissionSaved(true); setTimeout(() => setMissionSaved(false), 1500);
  }

  async function sendComment(studentId, date, text) {
    if (!text?.trim()) return;
    const key = `${studentId}_${date}`;
    setSending(p => ({ ...p, [key]: true }));
    const { data } = await sb.from("comments")
      .insert({ student_id: studentId, date, text: text.trim() }).select().single();
    // 알림 추가
    await sb.from("notifications").insert({ student_id: studentId, message: "선생님이 댓글을 달았어요! 💬" });
    setComments(p => ({ ...p, [date]: [...(p[date]||[]), data] }));
    setCommentDraft(p => ({ ...p, [key]: "" }));
    setSending(p => ({ ...p, [key]: false }));
  }

  async function deleteComment(studentId, date, commentId) {
    await sb.from("comments").delete().eq("id", commentId);
    setComments(p => ({ ...p, [date]: (p[date]||[]).filter(c => c.id !== commentId) }));
  }

  async function sendMathComment(studentId, text) {
    if (!text?.trim()) return;
    const dateTag = "math_"+dateKey;
    const { data } = await sb.from("comments").insert({ student_id: studentId, date: dateTag, text: text.trim() }).select().single();
    await sb.from("notifications").insert({ student_id: studentId, message: "선생님이 수학 댓글을 달았어요! 💬" });
    setMathComments(p => ({ ...p, [studentId]: [...(p[studentId]||[]), data] }));
    setMathCommentDraft(p => ({ ...p, [studentId]: "" }));
  }

  async function deleteMathComment(studentId, commentId) {
    await sb.from("comments").delete().eq("id", commentId);
    setMathComments(p => ({ ...p, [studentId]: (p[studentId]||[]).filter(c => c.id !== commentId) }));
  }

  async function sendMissionComment(studentId, text) {
    if (!text?.trim()) return;
    const dateTag = "mission_"+dateKey;
    const { data } = await sb.from("comments").insert({ student_id: studentId, date: dateTag, text: text.trim() }).select().single();
    await sb.from("notifications").insert({ student_id: studentId, message: "선생님이 미션 댓글을 달았어요! 💬" });
    setMissionComments(p => ({ ...p, [studentId]: [...(p[studentId]||[]), data] }));
    setMissionCommentDraft(p => ({ ...p, [studentId]: "" }));
  }

  async function deleteMissionComment(studentId, commentId) {
    await sb.from("comments").delete().eq("id", commentId);
    setMissionComments(p => ({ ...p, [studentId]: (p[studentId]||[]).filter(c => c.id !== commentId) }));
  }

  function buildCopyText(w) {
    const coms = comments[w.date] || [];
    return [
      w.date,
      w.title || "제목 없음",
      "",
      w.content || "",
      ...(coms.length > 0 ? ["", "── 선생님 댓글 ──", ...coms.map(c => c.text)] : []),
    ].join("\n");
  }

  function buildAllText() {
    return writings.map(w => buildCopyText(w) + "\n\n" + "─".repeat(30)).join("\n\n");
  }

  if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><Spinner/></div>;

  return (
    <div className="teacher-wrap">
      <header className="t-header">
        <div className="t-logo">🍀 선생님 교실</div>
        <nav className="t-nav">
          {[{key:"writings",label:"📖 글 & 댓글"},{key:"students",label:"👥 학생·미션"}].map(t => (
            <button key={t.key} className={`t-nav-btn ${tab===t.key?"active":""}`} onClick={() => setTab(t.key)}>{t.label}</button>
          ))}
        </nav>
      </header>

      {/* ── 글 & 댓글 ── */}
      {tab === "writings" && (
        <div className="writings-layout">
          <aside className="writings-sidebar">
            <div className="ws-title">학생 선택</div>
            {students.map((s, i) => {
              const sub = todaySubs[s.id] || {};
              const writingCount = 0; // 성능상 전체 카운트는 선택시만
              return (
                <div key={s.id} className={`ws-item ${selectedId===s.id?"active":""}`}
                  style={{borderLeft:`4px solid ${s.color}`}} onClick={() => setSelectedId(s.id)}>
                  <span className="ws-name">{s.name}</span>
                  <div className="ws-badges-mini">
                    <span className={`dot ${sub.writing?"on":""}`}/>
                    <span className={`dot ${sub.math?"on":""}`}/>
                    <span className={`dot ${sub.mission?"on":""}`}/>
                  </div>
                </div>
              );
            })}
            {students.length === 0 && <div className="ws-empty">학생을 먼저 등록하세요</div>}
          </aside>

          <main className="writings-main">
            {!selected ? (
              <div className="no-select">← 학생을 선택하면 글이 표시됩니다</div>
            ) : (
              <>
                <div className="wm-header">
                  <div className="wm-name" style={{color:selected.color}}>{selected.name}</div>
                  <div className="wm-actions">
                    <span className="wm-count">{writings.length}편</span>
                    {writings.length > 0 && <CopyBtn label="📋 전체 복사" text={buildAllText()}/>}
                  </div>
                </div>

                {writings.length === 0 && <div className="no-select" style={{marginTop:40}}>아직 제출한 글이 없어요</div>}

                {writings.map(w => {
                  const comList = comments[w.date] || [];
                  const dk = `${selected.id}_${w.date}`;
                  return (
                    <article key={w.id} className="entry-card">
                      <div className="ec-top-row">
                        <div className="ec-date">{w.date}</div>
                        <CopyBtn text={buildCopyText(w)}/>
                      </div>
                      <div className="ec-title">{w.title || "제목 없음"}</div>
                      <div className="ec-content">{w.content}</div>

                      {comList.length > 0 && (
                        <div className="comment-list">
                          {comList.map(c => (
                            <div key={c.id} className="comment-item">
                              <div className="ci-avatar">선생님</div>
                              <div className="ci-body">
                                <div className="ci-text">{c.text}</div>
                                <div className="ci-meta">
                                  <span>{c.created_at ? new Date(c.created_at).toLocaleString("ko-KR",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : ""}</span>
                                  <button className="ci-del" onClick={() => deleteComment(selected.id, w.date, c.id)}>삭제</button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      <div className="comment-input-area">
                        <textarea className="comment-textarea"
                          placeholder="댓글을 입력하세요… (전송하면 학생에게 알림이 가요)"
                          value={commentDraft[dk] || ""}
                          onChange={e => setCommentDraft(p => ({...p, [dk]: e.target.value}))}/>
                        <div className="comment-btns">
                          <button className="send-comment-btn"
                            disabled={!commentDraft[dk]?.trim() || sending[dk]}
                            onClick={() => sendComment(selected.id, w.date, commentDraft[dk])}
                            style={{background: selected.color}}>
                            {sending[dk] ? "전송 중…" : "💬 댓글 달기"}
                          </button>
                        </div>
                      </div>
                    </article>
                  );
                })}
              </>
            )}
          </main>
        </div>
      )}

      {/* ── 학생·미션 관리 ── */}
      {tab === "students" && (
        <div className="t-content">
          <div className="t-section">
            <h2 className="section-title">미션</h2>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <input type="date" value={missionDate}
                onChange={e => { setMissionDate(e.target.value); loadMission(e.target.value); }}
                style={{padding:"10px 12px",borderRadius:10,border:"2px solid #ddd",fontSize:14,fontFamily:"'Noto Sans KR',sans-serif",outline:"none",cursor:"pointer"}}/>
              <span style={{fontSize:12,color:missionDate===today()?"#4a7a4e":"#e07b6a",fontWeight:700}}>
                {missionDate===today()?"오늘":"다른 날짜"}
              </span>
            </div>
            <div className="mission-edit">
              <input className="mission-input" value={mission} onChange={e => setMission(e.target.value)} placeholder="미션 내용 입력"/>
              <button className="mission-save-btn" onClick={saveMission}>{missionSaved ? "✓ 저장됨" : "저장"}</button>
            </div>
          </div>

          {/* 수학/미션 상세 탭 */}
          <div className="t-section">
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[{key:"math",label:"🔢 수학 현황"},{key:"mission",label:"🎯 미션 현황"},{key:"manage",label:"👥 학생 관리"}].map(t => (
                <button key={t.key}
                  style={{padding:"8px 16px",borderRadius:20,border:"1.5px solid",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                    background:detailTab===t.key?"#2d3a2e":"#fff",
                    color:detailTab===t.key?"#fff":"#2d3a2e",
                    borderColor:detailTab===t.key?"#2d3a2e":"#ddd"}}
                  onClick={()=>setDetailTab(t.key)}>{t.label}</button>
              ))}
            </div>

            {/* 수학 현황 */}
            {detailTab === "math" && (
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                {students.length===0 && <div className="no-select">학생을 먼저 등록하세요</div>}
                {students.map((s, i) => {
                  const sub = todaySubs[s.id] || {};
                  const md = mathDetail[s.id];
                  const coms = mathComments[s.id] || [];
                  return (
                    <div key={s.id} className="entry-card" style={{borderLeft:`4px solid ${s.color}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontWeight:700,fontSize:16,color:s.color}}>{s.name}</div>
                        <span className={`badge ${sub.math?"on":""}`}>{sub.math?"✓ 완료":"미제출"}</span>
                      </div>
                      {md ? (
                        <div style={{display:"flex",flexDirection:"column",gap:6}}>
                          <div style={{fontSize:14,color:"#555"}}>
                            틀린 문제 <b>{md.wrong_count}개</b>
                            {md.wrong_reason ? <span style={{marginLeft:8,background:"#f0f0f0",borderRadius:8,padding:"2px 10px",fontSize:13}}>{md.wrong_reason}</span> : null}
                          </div>
                          {md.memo && <div style={{fontSize:14,color:"#333",background:"#f7f5f0",borderRadius:10,padding:"10px 14px",marginTop:4}}>💬 {md.memo}</div>}
                        </div>
                      ) : <div style={{fontSize:13,color:"#bbb"}}>아직 제출하지 않았어요</div>}

                      {/* 댓글 목록 */}
                      {coms.length > 0 && (
                        <div className="comment-list" style={{marginTop:12}}>
                          {coms.map(c => (
                            <div key={c.id} className="comment-item">
                              <div className="ci-avatar">선생님</div>
                              <div className="ci-body">
                                <div className="ci-text">{c.text}</div>
                                <div className="ci-meta">
                                  <button className="ci-del" onClick={()=>deleteMathComment(s.id,c.id)}>삭제</button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                      {/* 댓글 입력 */}
                      <div className="comment-input-area" style={{marginTop:10}}>
                        <textarea className="comment-textarea" placeholder="수학 관련 댓글…"
                          value={mathCommentDraft[s.id]||""}
                          onChange={e=>setMathCommentDraft(p=>({...p,[s.id]:e.target.value}))}/>
                        <div className="comment-btns">
                          <button className="send-comment-btn"
                            disabled={!mathCommentDraft[s.id]?.trim()}
                            style={{background:s.color}}
                            onClick={()=>sendMathComment(s.id,mathCommentDraft[s.id])}>
                            💬 댓글 달기
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* 미션 현황 */}
            {detailTab === "mission" && (
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                {students.length===0 && <div className="no-select">학생을 먼저 등록하세요</div>}
                {students.map((s, i) => {
                  const sub = todaySubs[s.id] || {};
                  const md = missionDetail[s.id];
                  const coms = missionComments[s.id] || [];
                  return (
                    <div key={s.id} className="entry-card" style={{borderLeft:`4px solid ${s.color}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontWeight:700,fontSize:16,color:s.color}}>{s.name}</div>
                        <span className={`badge ${sub.mission?"on":""}`}>{sub.mission?"✓ 완료":"미완료"}</span>
                      </div>
                      {md ? (
                        <div style={{display:"flex",flexDirection:"column",gap:6}}>
                          {md.comment && <div style={{fontSize:14,color:"#333",background:"#f7f5f0",borderRadius:10,padding:"10px 14px"}}>💬 {md.comment}</div>}
                          {!md.comment && <div style={{fontSize:13,color:"#bbb"}}>한마디 없음</div>}
                        </div>
                      ) : <div style={{fontSize:13,color:"#bbb"}}>아직 제출하지 않았어요</div>}

                      {/* 댓글 목록 */}
                      {coms.length > 0 && (
                        <div className="comment-list" style={{marginTop:12}}>
                          {coms.map(c => (
                            <div key={c.id} className="comment-item">
                              <div className="ci-avatar">선생님</div>
                              <div className="ci-body">
                                <div className="ci-text">{c.text}</div>
                                <div className="ci-meta">
                                  <button className="ci-del" onClick={()=>deleteMissionComment(s.id,c.id)}>삭제</button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                      {/* 댓글 입력 */}
                      <div className="comment-input-area" style={{marginTop:10}}>
                        <textarea className="comment-textarea" placeholder="미션 관련 댓글…"
                          value={missionCommentDraft[s.id]||""}
                          onChange={e=>setMissionCommentDraft(p=>({...p,[s.id]:e.target.value}))}/>
                        <div className="comment-btns">
                          <button className="send-comment-btn"
                            disabled={!missionCommentDraft[s.id]?.trim()}
                            style={{background:s.color}}
                            onClick={()=>sendMissionComment(s.id,missionCommentDraft[s.id])}>
                            💬 댓글 달기
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* 학생 관리 */}
            {detailTab === "manage" && (
              <div style={{display:"flex",flexDirection:"column",gap:14}}>

                {/* 반 설정 */}
                <div style={{background:"#f7f7f5",borderRadius:14,padding:16,display:"flex",flexDirection:"column",gap:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#888"}}>반 설정</div>
                  <div style={{display:"flex",gap:8}}>
                    <input placeholder="이모지" value={editEmoji} onChange={e=>setEditEmoji(e.target.value)}
                      style={{width:64,padding:"10px 12px",borderRadius:10,border:"2px solid #ddd",fontSize:20,textAlign:"center",outline:"none"}}/>
                    <input placeholder="반 이름" value={editClassName} onChange={e=>setEditClassName(e.target.value)}
                      style={{flex:1,padding:"10px 14px",borderRadius:10,border:"2px solid #ddd",fontSize:15,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}/>
                    <button onClick={saveClassConfig} disabled={classSaving}
                      style={{padding:"10px 16px",background:"#2d3a2e",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif",whiteSpace:"nowrap",opacity:classSaving?0.5:1}}>
                      {classSaving?"저장중":"저장"}
                    </button>
                  </div>
                </div>

                <div className="add-row">
                  <input className="add-input" placeholder="학생 이름 입력 후 엔터" value={newName}
                    onChange={e => { setNewName(e.target.value); setAddError(""); }}
                    onKeyDown={e => e.key==="Enter" && addStudent()}/>
                  <button className="add-confirm-btn" onClick={addStudent} disabled={adding}>
                    {adding ? "등록 중…" : "+ 등록"}
                  </button>
                </div>
                {addError && <div style={{color:"#e55",fontSize:"13px",background:"#fff0f0",borderRadius:"8px",padding:"8px 12px"}}>{addError}</div>}
                <div className="student-grid">
                  {students.map((s, i) => {
                    const sub = todaySubs[s.id] || {};
                    return (
                      <div key={s.id} className="student-card"
                        data-sid={s.id}
                        draggable
                        onDragStart={() => { dragSrcId.current = s.id; }}
                        onDragOver={e => { e.preventDefault(); setDragOverId(s.id); }}
                        onDragLeave={() => setDragOverId(null)}
                        onDrop={() => doReorder(dragSrcId.current, s.id)}
                        onDragEnd={() => setDragOverId(null)}
                        onTouchStart={() => { dragSrcId.current = s.id; }}
                        onTouchMove={onTouchMove}
                        onTouchEnd={() => doReorder(dragSrcId.current, dragOverId)}
                        style={{borderTop:`4px solid ${s.color}`, cursor:"grab",
                          opacity: dragSrcId.current === s.id ? 0.4 : 1,
                          background: dragOverId === s.id ? "#f0f7f0" : "#fff",
                          transform: dragOverId === s.id ? "scale(1.03)" : "scale(1)",
                          transition:"transform .15s,background .15s"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div className="sc-name">{s.name}</div>
                          <span style={{fontSize:16,color:"#bbb",userSelect:"none"}}>⠿</span>
                        </div>
                        <div className="sc-today-label">오늘 제출</div>
                        <div className="sc-badges">
                          <span className={`badge ${sub.writing?"on":""}`}>✏️ 글</span>
                          <span className={`badge ${sub.math?"on":""}`}>🔢 수학</span>
                          <span className={`badge ${sub.mission?"on":""}`}>🎯 미션</span>
                        </div>
                        <button className="del-s-btn" onClick={() => removeStudent(s.id)}>삭제</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STUDENT VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function StudentView() {
  const [students, setStudents] = React.useState([]);
  const [selectedId, setSelectedId] = React.useState(null);
  const [tab, setTab] = React.useState("writing");
  const [writing, setWriting] = React.useState({title:"", content:""});
  const [math, setMath] = React.useState({wrong_count:0, wrong_reason:"", memo:"", done:false});
  const [missionData, setMissionData] = React.useState({done:false, comment:""});
  const [missionText, setMissionText] = React.useState("오늘의 미션을 입력하세요");
  const [myComments, setMyComments] = React.useState([]);
  const [myMathComments, setMyMathComments] = React.useState([]);
  const [myMissionComments, setMyMissionComments] = React.useState([]);
  const [notifications, setNotifications] = React.useState([]);
  const [showNotif, setShowNotif] = React.useState(false);
  const [saved, setSaved] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const [submitting, setSubmitting] = React.useState(false);
  const [writingHistory, setWritingHistory] = React.useState([]);
  const [mathHistory, setMathHistory] = React.useState([]);
  const [missionHistory, setMissionHistory] = React.useState([]);
  const [allComments, setAllComments] = React.useState([]);

  const WRONG_REASONS = ["계산 실수","개념 이해 부족","문제를 잘못 읽음","풀이 방법 모름","시간 부족","기타"];
  const dateKey = today();
  const student = students.find(s => s.id === selectedId);
  const lineCount = writing.content.split("\n").filter(l => l.trim()).length;

  React.useEffect(() => {
    loadStudents();
  }, []);

  React.useEffect(() => {
    if (!selectedId) return;
    loadTodayData();
    loadMission();
    loadMyComments();
    loadHistory();
    loadNotifications();
    // 실시간 알림 구독
    const channel = sb.channel(`student-${selectedId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications',
          filter: `student_id=eq.${selectedId}` }, () => {
        loadNotifications();
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments',
          filter: `student_id=eq.${selectedId}` }, () => {
        loadMyComments();
        loadNotifications();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'missions' }, () => {
        loadMission();
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [selectedId]);

  async function loadStudents() {
    const { data } = await sb.from("students").select("*").eq("class_id", CLASS_ID).order("sort_order", {nullsFirst:false}).order("created_at");
    setStudents(data || []);
    setLoading(false);
  }

  async function loadMission() {
    const { data } = await sb.from("missions").select("*").eq("date", dateKey).eq("class_id", CLASS_ID).maybeSingle();
    if (data) setMissionText(data.content);
  }

  async function loadTodayData() {
    const { data: w } = await sb.from("writings").select("*").eq("student_id", selectedId).eq("date", dateKey).maybeSingle();
    if (w) setWriting({title: w.title||"", content: w.content||""});
    const { data: m } = await sb.from("maths").select("*").eq("student_id", selectedId).eq("date", dateKey).maybeSingle();
    if (m) setMath({wrong_count: m.wrong_count, wrong_reason: m.wrong_reason||"", memo: m.memo||"", done: m.done});
    const { data: ms } = await sb.from("mission_submissions").select("*").eq("student_id", selectedId).eq("date", dateKey).maybeSingle();
    if (ms) setMissionData({done: ms.done, comment: ms.comment||""});
  }

  async function loadMyComments() {
    // 글쓰기 댓글 (최신 10개)
    const { data: writeData } = await sb.from("comments").select("*")
      .eq("student_id", selectedId)
      .not("date", "like", "math_%")
      .not("date", "like", "mission_%")
      .order("created_at", {ascending:false}).limit(10);
    setMyComments(writeData || []);

    // 수학 댓글 (오늘 것만, 별도 쿼리)
    const { data: mathData } = await sb.from("comments").select("*")
      .eq("student_id", selectedId)
      .eq("date", "math_"+today())
      .order("created_at", {ascending:true});
    setMyMathComments(mathData || []);

    // 미션 댓글 (오늘 것만, 별도 쿼리)
    const { data: missionData } = await sb.from("comments").select("*")
      .eq("student_id", selectedId)
      .eq("date", "mission_"+today())
      .order("created_at", {ascending:true});
    setMyMissionComments(missionData || []);
  }

  async function loadHistory() {
    const sid = selectedId;
    const { data: ws } = await sb.from("writings").select("*")
      .eq("student_id", sid).neq("date", dateKey).order("date", {ascending:false});
    setWritingHistory(ws || []);
    const { data: ms } = await sb.from("maths").select("*")
      .eq("student_id", sid).neq("date", dateKey).order("date", {ascending:false});
    setMathHistory(ms || []);
    const { data: mis } = await sb.from("mission_submissions").select("*")
      .eq("student_id", sid).neq("date", dateKey).order("date", {ascending:false});
    setMissionHistory(mis || []);
    const { data: cs } = await sb.from("comments").select("*")
      .eq("student_id", sid).order("created_at", {ascending:true});
    setAllComments(cs || []);
  }

  async function loadNotifications() {
    const { data } = await sb.from("notifications").select("*")
      .eq("student_id", selectedId).eq("read", false).order("created_at", {ascending:false});
    setNotifications(data || []);
  }

  async function markRead() {
    await sb.from("notifications").update({read:true}).eq("student_id", selectedId).eq("read", false);
    setNotifications([]);
    setShowNotif(false);
    loadMyComments();
  }

  async function saveWriting() {
    if (!writing.content.trim()) return;
    setSubmitting(true);
    await sb.from("writings").upsert(
      {student_id: selectedId, date: dateKey, title: writing.title, content: writing.content},
      {onConflict: "student_id,date"}
    );
    setSubmitting(false);
    setSaved(p => ({...p, writing:true}));
    setTimeout(() => setSaved(p => ({...p, writing:false})), 2000);
  }

  async function saveMath() {
    setSubmitting(true);
    await sb.from("maths").upsert(
      {student_id: selectedId, date: dateKey, wrong_count: math.wrong_count, wrong_reason: math.wrong_reason, memo: math.memo, done: math.done},
      {onConflict: "student_id,date"}
    );
    setSubmitting(false);
    setSaved(p => ({...p, math:true}));
    setTimeout(() => setSaved(p => ({...p, math:false})), 2000);
  }

  async function saveMission() {
    setSubmitting(true);
    await sb.from("mission_submissions").upsert(
      {student_id: selectedId, date: dateKey, done: missionData.done, comment: missionData.comment},
      {onConflict: "student_id,date"}
    );
    setSubmitting(false);
    setSaved(p => ({...p, mission:true}));
    setTimeout(() => setSaved(p => ({...p, mission:false})), 2000);
  }

  if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><Spinner/></div>;

  // 이름 선택 화면
  if (!selectedId) {
    return (
      <div className="student-select-wrap">
        <div className="ss-title">🌟 내 이름을 찾아요!</div>
        <div className="ss-grid">
          {students.map(s => (
            <button key={s.id} className="ss-card" style={{background:s.color}} onClick={() => setSelectedId(s.id)}>
              <div className="ss-avatar">{s.name[0]}</div>
              <div className="ss-card-name">{s.name}</div>
            </button>
          ))}
        </div>
        {students.length === 0 && <div className="empty-msg">선생님이 아직 학생을 등록하지 않았어요 😊</div>}
      </div>
    );
  }

  return (
    <div className="student-main">
      {/* 알림 배너 */}
      {notifications.length > 0 && (
        <div className="notif-banner" onClick={() => setShowNotif(true)}>
          🔔 선생님 댓글이 달렸어요! 확인해보세요
        </div>
      )}

      {/* 알림 모달 */}
      {showNotif && (
        <div className="notif-overlay" onClick={markRead}>
          <div className="notif-modal" onClick={e => e.stopPropagation()}>
            <div className="nm-title">💬 선생님 댓글</div>
            {myComments.slice(0,4).map(c => (
              <div key={c.id} className="nm-item">
                <div className="nm-date">{c.date}</div>
                <div className="nm-text">{c.text}</div>
              </div>
            ))}
            <button className="nm-close" onClick={markRead}>확인! ✓</button>
          </div>
        </div>
      )}

      <header className="s-header" style={{background:student.color}}>
        <button className="back-s-btn" onClick={() => { setSelectedId(null); setWriting({title:"",content:""}); setMath({wrong_count:0,wrong_reason:"",memo:"",done:false}); setMissionData({done:false,comment:""}); }}>←</button>
        <div className="s-header-name">{student.name}의 오늘</div>
        {myComments.length > 0 && (
          <button className="s-fb-badge" onClick={() => setShowNotif(true)}>
            💬 {myComments.length}
            {notifications.length > 0 && <span className="unread-dot"/>}
          </button>
        )}
      </header>

      <nav className="s-tabs">
        {[{key:"writing",label:"✏️ 글쓰기"},{key:"math",label:"🔢 수학"},{key:"mission",label:"🎯 미션"}].map(t => (
          <button key={t.key} className={`s-tab-btn ${tab===t.key?"active":""}`}
            style={tab===t.key?{borderBottom:`3px solid ${student.color}`,color:student.color}:{}}
            onClick={() => setTab(t.key)}>{t.label}</button>
        ))}
      </nav>

      <div className="s-body">
        {/* 글쓰기 */}
        {tab === "writing" && (
          <div className="writing-tab">
            <div className="notebook-paper">
              <div className="np-redline"/>
              <input className="np-title-input" placeholder="제목을 써 보세요 ✍️"
                value={writing.title} onChange={e => setWriting({...writing, title:e.target.value})}/>
              <div className="np-rule"/>
              <textarea className="np-content" rows={8}
                placeholder="오늘 있었던 일, 생각, 느낌을 자유롭게 써 보세요!"
                value={writing.content} onChange={e => setWriting({...writing, content:e.target.value})}/>
              <div className="np-footer">
                <span className={`line-counter ${lineCount>=3?"ok":"warn"}`}>
                  {lineCount}줄 {lineCount>=3?"✓":"(3줄 이상 권장)"}
                </span>
              </div>
            </div>
            <button className="submit-btn" style={{background:student.color}}
              onClick={saveWriting} disabled={!writing.content.trim() || submitting}>
              {saved.writing ? "✓ 저장됐어요!" : submitting ? "저장 중…" : "📤 제출하기"}
            </button>

            {/* 오늘 댓글 미리보기 */}
            {myComments.filter(c => c.date === dateKey).length > 0 && (
              <div className="s-comment-preview">
                <div className="scp-label">💬 선생님 댓글</div>
                {myComments.filter(c => c.date === dateKey).map(c => (
                  <div key={c.id} className="scp-item">
                    <div className="scp-text">{c.text}</div>
                  </div>
                ))}
              </div>
            )}

            {/* 이전 글 목록 */}
            {writingHistory.length > 0 && (
              <div style={{marginTop:24}}>
                <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:12,borderTop:"2px dashed #eee",paddingTop:16}}>📚 이전 글</div>
                {writingHistory.map(w => {
                  const wc = allComments.filter(c => c.date === w.date);
                  return (
                    <div key={w.id} style={{background:"#fff",borderRadius:14,padding:20,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderLeft:`3px solid ${student.color}`}}>
                      <div style={{fontSize:11,color:"#c8a96e",fontWeight:700,marginBottom:6}}>{w.date}</div>
                      {w.title && <div style={{fontFamily:"'Gaegu',cursive",fontSize:20,color:"#2d3a2e",marginBottom:8}}>{w.title}</div>}
                      <div style={{fontSize:14,lineHeight:1.9,color:"#333",whiteSpace:"pre-wrap"}}>{w.content}</div>
                      {wc.length > 0 && (
                        <div style={{marginTop:12,padding:"10px 14px",background:"#f0f7f0",borderRadius:10}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#4a7a4e",marginBottom:6}}>💬 선생님 댓글</div>
                          {wc.map(c => <div key={c.id} style={{fontSize:13,lineHeight:1.8,color:"#333",whiteSpace:"pre-wrap"}}>{c.text}</div>)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* 수학 */}
        {tab === "math" && (
          <div className="math-tab">
            <div className="math-card">
              <div className="mc-label">오늘 틀린 문제가 몇 개예요?</div>
              <div className="wrong-count-row">
                {[0,1,2,3,4,5,"6+"].map(n => (
                  <button key={n} className={`wc-btn ${math.wrong_count===n?"active":""}`}
                    style={math.wrong_count===n?{background:student.color,color:"#fff",borderColor:student.color}:{}}
                    onClick={() => setMath({...math, wrong_count:n})}>{n}개</button>
                ))}
              </div>
            </div>
            {math.wrong_count !== 0 && (
              <div className="math-card">
                <div className="mc-label">왜 틀렸을까요?</div>
                <div className="reason-grid">
                  {WRONG_REASONS.map(r => (
                    <button key={r} className={`reason-btn ${math.wrong_reason===r?"active":""}`}
                      style={math.wrong_reason===r?{background:student.color,color:"#fff",borderColor:student.color}:{}}
                      onClick={() => setMath({...math, wrong_reason:r})}>{r}</button>
                  ))}
                </div>
              </div>
            )}
            <div className="math-card">
              <div className="mc-label">선생님께 하고 싶은 말 (선택)</div>
              <textarea className="mission-comment-input"
                placeholder="오늘 수학 어땠어요? 어려웠던 점이나 궁금한 것을 써 보세요!"
                value={math.memo}
                onChange={e => setMath({...math, memo:e.target.value})}/>
            </div>
            <button className="submit-btn" style={{background:student.color}}
              onClick={() => { setMath(m => ({...m, done:true})); saveMath(); }} disabled={submitting}>
              {saved.math ? "✓ 저장됐어요!" : submitting ? "저장 중…" : "📤 오답 완료 & 제출"}
            </button>
            {myMathComments.length > 0 && (
              <div className="s-comment-preview">
                <div className="scp-label">💬 선생님 댓글</div>
                {myMathComments.map(c => (
                  <div key={c.id} className="scp-item">
                    <div className="scp-text">{c.text}</div>
                  </div>
                ))}
              </div>
            )}

            {/* 이전 수학 기록 */}
            {mathHistory.length > 0 && (
              <div style={{marginTop:24}}>
                <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:12,borderTop:"2px dashed #eee",paddingTop:16}}>🔢 이전 수학 기록</div>
                {mathHistory.map(m => {
                  const mc = allComments.filter(c => c.date === "math_"+m.date);
                  return (
                    <div key={m.id} style={{background:"#fff",borderRadius:14,padding:20,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderLeft:`3px solid ${student.color}`}}>
                      <div style={{fontSize:11,color:"#c8a96e",fontWeight:700,marginBottom:8}}>{m.date}</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
                        <span style={{background:"#f0f0f0",borderRadius:20,padding:"3px 10px",fontSize:13}}>틀린 문제 {m.wrong_count}개</span>
                        {m.wrong_reason && <span style={{background:"#f0f0f0",borderRadius:20,padding:"3px 10px",fontSize:13}}>{m.wrong_reason}</span>}
                        {m.done && <span style={{background:"#e8f5e9",color:"#2d7a40",borderRadius:20,padding:"3px 10px",fontSize:13,fontWeight:700}}>✓ 오답 완료</span>}
                      </div>
                      {m.memo && <div style={{fontSize:13,color:"#555",lineHeight:1.7,marginTop:6}}>{m.memo}</div>}
                      {mc.length > 0 && (
                        <div style={{marginTop:12,padding:"10px 14px",background:"#f0f7f0",borderRadius:10}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#4a7a4e",marginBottom:6}}>💬 선생님 댓글</div>
                          {mc.map(c => <div key={c.id} style={{fontSize:13,lineHeight:1.8,color:"#333",whiteSpace:"pre-wrap"}}>{c.text}</div>)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* 미션 */}
        {tab === "mission" && (
          <div className="mission-tab">
            <div className="mission-banner" style={{background:student.color+"22",borderColor:student.color}}>
              <div className="mb-label">🎯 오늘의 미션</div>
              <div className="mb-text">{missionText}</div>
            </div>
            <div className="mc-label" style={{marginTop:8}}>한마디 (선택)</div>
            <textarea className="mission-comment-input"
              placeholder="미션 하고 나서 느낌을 써 보세요!"
              value={missionData.comment}
              onChange={e => setMissionData({...missionData, comment:e.target.value})}/>
            <button className="submit-btn" style={{background:student.color}}
              onClick={() => { setMissionData(m => ({...m, done:true})); saveMission(); }} disabled={submitting}>
              {saved.mission ? "✓ 저장됐어요!" : submitting ? "저장 중…" : "🎯 미션 완료 & 제출"}
            </button>
            {myMissionComments.length > 0 && (
              <div className="s-comment-preview">
                <div className="scp-label">💬 선생님 댓글</div>
                {myMissionComments.map(c => (
                  <div key={c.id} className="scp-item">
                    <div className="scp-text">{c.text}</div>
                  </div>
                ))}
              </div>
            )}

            {/* 이전 미션 기록 */}
            {missionHistory.length > 0 && (
              <div style={{marginTop:24}}>
                <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:12,borderTop:"2px dashed #eee",paddingTop:16}}>🎯 이전 미션 기록</div>
                {missionHistory.map(ms => {
                  const msc = allComments.filter(c => c.date === "mission_"+ms.date);
                  return (
                    <div key={ms.id} style={{background:"#fff",borderRadius:14,padding:20,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.05)",borderLeft:`3px solid ${student.color}`}}>
                      <div style={{fontSize:11,color:"#c8a96e",fontWeight:700,marginBottom:8}}>{ms.date}</div>
                      {ms.done && <span style={{background:"#e8f5e9",color:"#2d7a40",borderRadius:20,padding:"3px 10px",fontSize:13,fontWeight:700,display:"inline-block",marginBottom:6}}>✓ 미션 완료</span>}
                      {ms.comment && <div style={{fontSize:13,color:"#555",lineHeight:1.7,marginTop:6}}>{ms.comment}</div>}
                      {msc.length > 0 && (
                        <div style={{marginTop:12,padding:"10px 14px",background:"#f0f7f0",borderRadius:10}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#4a7a4e",marginBottom:6}}>💬 선생님 댓글</div>
                          {msc.map(c => <div key={c.id} style={{fontSize:13,lineHeight:1.8,color:"#333",whiteSpace:"pre-wrap"}}>{c.text}</div>)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [mode, setMode] = React.useState(null);
  const [showPwModal, setShowPwModal] = React.useState(false);
  const [pwInput, setPwInput] = React.useState("");
  const [pwError, setPwError] = React.useState(false);
  const [classConfig, setClassConfig] = React.useState(null);
  const [classLoading, setClassLoading] = React.useState(true);
  const [showSetup, setShowSetup] = React.useState(false);
  const [setupName, setSetupName] = React.useState("");
  const [setupPw, setSetupPw] = React.useState("");
  const [setupSaving, setSetupSaving] = React.useState(false);

  React.useEffect(() => { loadClass(); }, []);

  async function loadClass() {
    const { data } = await sb.from("classrooms").select("*").eq("class_id", CLASS_ID).maybeSingle();
    if (data) { setClassConfig(data); }
    else { setShowSetup(true); }
    setClassLoading(false);
  }

  async function createClass() {
    if (!setupName.trim() || !setupPw.trim()) return;
    setSetupSaving(true);
    const { data } = await sb.from("classrooms")
      .insert({ class_id: CLASS_ID, class_name: setupName.trim(), teacher_pw: setupPw.trim() })
      .select().single();
    if (data) { setClassConfig(data); setShowSetup(false); }
    setSetupSaving(false);
  }

  if (classLoading) return <div className="spinner"><div className="spin-circle"/></div>;

  if (showSetup) return (
    <div className="landing">
      <div className="landing-inner" style={{gap:20}}>
        <div className="landing-emoji">🏫</div>
        <h1 className="landing-title" style={{fontSize:36}}>반 첫 설정</h1>
        <p className="landing-sub" style={{fontSize:15}}>반 코드: <b>{CLASS_ID}</b></p>
        <div style={{display:"flex",flexDirection:"column",gap:12,width:280}}>
          <input placeholder="반 이름 (예: 3학년 2반)"
            value={setupName} onChange={e=>setSetupName(e.target.value)}
            style={{padding:"12px 16px",borderRadius:12,border:"2px solid #ddd",fontSize:15,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}/>
          <input type="password" placeholder="선생님 비밀번호 설정"
            value={setupPw} onChange={e=>setSetupPw(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&createClass()}
            style={{padding:"12px 16px",borderRadius:12,border:"2px solid #ddd",fontSize:15,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}/>
          <button onClick={createClass}
            disabled={setupSaving||!setupName.trim()||!setupPw.trim()}
            style={{padding:"14px",background:"#2d3a2e",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif",opacity:(setupSaving||!setupName.trim()||!setupPw.trim())?0.5:1}}>
            {setupSaving?"저장 중...":"우리 교실 만들기 🎉"}
          </button>
        </div>
      </div>
    </div>
  );

  const TEACHER_PW = classConfig.teacher_pw;
  const CLASS_NAME = classConfig.class_name;

  function tryTeacher() {
    if (pwInput === TEACHER_PW) {
      setShowPwModal(false); setPwInput(""); setPwError(false); setMode("teacher");
    } else {
      setPwError(true); setPwInput("");
    }
  }

  if (!mode) return (
    <div className="landing">
      <div className="landing-inner">
        <div className="landing-emoji">{classConfig.emoji || "📚"}</div>
        <h1 className="landing-title">{CLASS_NAME}</h1>
        <p className="landing-sub">누구세요?</p>
        <div className="landing-btns">
          <button className="land-btn teacher" onClick={() => { setShowPwModal(true); setPwError(false); setPwInput(""); }}>
            <span className="lb-icon">👩‍🏫</span><span className="lb-label">선생님</span>
          </button>
          <button className="land-btn student" onClick={() => setMode("student")}>
            <span className="lb-icon">🧒</span><span className="lb-label">학생</span>
          </button>
        </div>
      </div>

      {showPwModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500}}>
          <div style={{background:"#fff",borderRadius:20,padding:32,width:300,display:"flex",flexDirection:"column",gap:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontFamily:"'Gaegu',cursive",fontSize:22,color:"#2d3a2e"}}>🔑 선생님 확인</div>
            <input
              type="password"
              placeholder="비밀번호를 입력하세요"
              value={pwInput}
              autoFocus
              onChange={e => { setPwInput(e.target.value); setPwError(false); }}
              onKeyDown={e => e.key==="Enter" && tryTeacher()}
              style={{padding:"12px 14px",borderRadius:12,border:pwError?"2px solid #e55":"2px solid #ddd",fontSize:15,outline:"none",fontFamily:"inherit"}}/>
            {pwError && <div style={{color:"#e55",fontSize:13,textAlign:"center"}}>비밀번호가 틀렸어요 🙅</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowPwModal(false)}
                style={{flex:1,padding:12,borderRadius:12,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>취소</button>
              <button onClick={tryTeacher}
                style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#2d3a2e",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>입장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div className="app-root">
      <div className="mode-switch">
        <button className="mode-back-btn" onClick={() => setMode(null)}>← 처음으로</button>
      </div>
      {mode === "teacher" ? <TeacherView/> : <StudentView/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>
</body>
</html>
